name: Installer smoke test

on:
  push:
    branches:
      - dev
      - feat/installer
  pull_request:
    branches:
      - dev
      - main

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Lint install.sh
        run: shellcheck install.sh

      - name: Lint tests/test_installer.sh
        run: shellcheck tests/test_installer.sh

      - name: Run installer smoke test
        env:
          TEST_INSTALLER_ALLOW_DESTROY: "1"
        run: bash tests/test_installer.sh --host

      - name: Dump compose logs on failure
        if: failure()
        run: docker compose logs --tail 200 || true

  # NOTE: the upstream `smoke-self-clone` job was removed in this private
  # overlay. It cloned `thejeremyhodge/xireactor-brilliant` at the PR's
  # branch name (via `install.sh --ref`) — branches in this overlay almost
  # never exist on the public upstream, so the job failed on every PR by
  # design. The job still lives upstream where it makes sense; reintroduce
  # here only if `install.sh` gains a `--repo` flag (or `REPO_SLUG` env
  # override) so it can self-clone from `CasinoResortInsight/xireactor-private`.
