26-05-25, open-to-close\n**Trial duration:** 90 days (ends 2026-08-23)\n\n## Context\n3-card poker on Table 8 has been the weakest table in the pit for two consecutive quarters:\n- Average drop: $1,420/day (pit average $2,950)\n- Average hold: 23% (within range, but on low drop)\n- Utilization: 4.1 hours/day open with active play\n\nTable games manager proposed High Card Flush as a 90-day swap. Slot/table cross-shop data suggests an underserved \"novelty poker derivative\" segment in our player base.\n\n## Decision\n**Approved.** Convert Table 8 from 3-card poker to High Card Flush for 90 days starting 2026-05-25.\n\n## Conditions\n- Day-60 review (2026-07-24) is a **kill switch**: if drop has not exceeded $2,000/day AND hold has not held above 18%, table converts back to 3-card poker effective Day 70.\n- Dealer training: all swing-shift dealers certified before Day 1 (training already scheduled 2026-05-24).\n- Surveillance coverage map updated for new game (M. Lopez).\n- TGC notified via routine game-add packet (J. Yellowhair) — non-blocking; we have prior approval for the title.\n\n## Why I'm comfortable\n- Low downside: a known weak table, easy reversal.\n- Vendor (Galaxy Gaming) provides marketing kit at no charge for 90-day trials.\n- Cross-pit cannibalization risk is minimal (different player profile from blackjack/baccarat).\n\n## Tie-ins\n- Mention in [[2026-05-23-gm-summary]].\n- Will appear in next [[q1-fy2026-slot-floor-review]] equivalent for table games (Q2 review).", "summary": "Approved 90-day trial of High Card Flush table game, replacing one underperforming 3-card poker table. Trial converts back automatically if hold and drop targets are not met by day 60.", "content_type": "decision", "logical_path": "decisions/gaming/high-card-flush-trial", "sensitivity": "operational", "department": null, "owner_id": "usr_xr_admin", "tags": ["decision", "table-games", "high-card-flush", "operational", "indian-head-casino"], "domain_meta": {}, "version": 1, "status": "published", "source": "web_ui", "created_by": "usr_xr_admin", "updated_by": "usr_xr_admin", "created_at": "2026-05-23T20:48:32.963243Z", "updated_at": "2026-05-23T20:48:32.963243Z", "claim_type": null, "source_confidence": null, "verification_status": null, "conflict_with": []}, {"id": "0c86ea1f-217b-4d13-8640-b183f573aeb0", "org_id": "org_demo", "title": "Meeting Notes - TGC Q2 Audit Prep Kickoff", "content": "# Meeting Notes — Tribal Gaming Commission Q2 Audit Prep Kickoff\n\n**Date:** 2026-05-23\n**Time:** 15:00–16:00\n**Location:** Compliance office\n**Attendees:**\n- GM (me)\n- R. Tom — TGC liaison\n- J. Yellowhair — Compliance Manager\n- M. Lopez — Surveillance Director\n- D. Yazzie — Slot Director\n- L. Carter — HR Director (Title 31 training)\n- N. Ortiz — Cage Manager\n\n## Audit scope (per TGC notice 2026-05-15)\n- Title 31 CTRs and SARs sampling (Q1 FY2026 records)\n- MICS compliance — slot, table games, cage, surveillance\n- Surveillance coverage maps and incident response logs\n- F&B comp controls (random sampling of comps over $250)\n- Self-exclusion program records\n\n## Owners + deadlines\n| Workstream | Owner | Documents due |\n|---|---|---|\n| Title 31 sampling pack | N. Ortiz | 2026-06-10 |\n| Slot MICS variance log | D. Yazzie | 2026-06-10 |\n| Table games MICS | (Table games manager, missing today — J. Yellowhair to follow up) | 2026-06-12 |\n| Surveillance coverage map (post-camera-refresh) | M. Lopez | 2026-06-08 |\n| F&B comp sampling | (F&B director — see [[fb-director-replacement]]) | 2026-06-12 |\n| Title 31 training rosters | L. Carter | 2026-06-08 |\n| SE program records | J. Yellowhair | 2026-06-08 |\n\n## On-site audit dates\n- Fieldwork: 2026-06-22 → 2026-06-26\n- Closing meeting: 2026-06-29\n\n## Risk areas flagged today\n1. **F&B comp sampling** — F&B director's documentation has been weak for two quarters. This is now a TGC-visible risk. (Cross-ref [[fb-director-replacement]] — sequencing matters: do not change leadership mid-audit.)\n2. **Slot MICS variance log** — D. Yazzie noted one $1,800 unreconciled variance from March still open. Needs closure documentation by 2026-06-05.\n3. **Surveillance dead-zone behind cage** — known issue, camera was on order, ETA 2026-06-15 (before fieldwork). M. Lopez to confirm install.\n\n## Standing item\nJ. Yellowhair will run a weekly check-in starting 2026-05-29 with owners; GM joins last 15 minutes for status.\n\n## Reminder\nPer [[backup-generator-kickoff]], R. Tom is also working a notification-requirement question for our generator cutovers — we'll piggyback that to this audit's outbrief.", "summary": "Kickoff for Q2 Tribal Gaming Commission audit. Scope covers Title 31, MICS, surveillance, cage/credit, and F&B comp controls. Owners and document deadlines assigned.", "content_type": "meeting", "logical_path": "meetings/compliance/tgc-q2-audit-prep", "sensitivity": "operational", "department": null, "owner_id": "usr_xr_admin", "tags": ["compliance", "tgc", "audit", "q2-fy2026", "meeting", "indian-head-casino"], "domain_meta": {}, "version": 1, "status": "published", "source": "web_ui", "created_by": "usr_xr_admin", "updated_by": "usr_xr_admin", "created_at": "2026-05-23T20:48:17.376015Z", "updated_at": "2026-05-23T20:48:17.376015Z", "claim_type": null, "source_confidence": null, "verification_status": null, "conflict_with": []}, {"id": "1f4f272c-e636-4908-989e-6b29851f1c21", "org_id": "org_demo", "title": "Q1 FY2026 Slot Floor Performance Review", "content": "# Q1 FY2026 Slot Floor Performance Review\n\n**Period:** 2026-01-01 → 2026-03-31\n**Authors:** Slot director (D. Yazzie) + GM\n**Reviewed:** 2026-05-21 (informal), 2026-05-23 (incorporated into Friday GM log)\n\n## Headline numbers\n- **Coin-in:** $48.2M (+3.8% YoY)\n- **Theoretical win:** $4.61M (+5.1% YoY)\n- **Hold %:** 9.56% (+12 bps YoY)\n- **Average machines on floor:** 494 of 500 (98.8% availability — best Q1 in 3 years)\n\n## Performance by denomination\n| Denom | Units | Coin-in | Theo win | Win/unit/day |\n|-------|------:|--------:|---------:|-------------:|\n| 1¢ video | 312 | $26.4M | $2.83M | $100.7 |\n| 5¢ video | 48  | $4.1M  | $0.39M | $90.2  |\n| 25¢ video | 36 | $3.8M  | $0.34M | $104.9 |\n| 1¢ reel (legacy) | 44 | $1.9M | $0.18M | $45.4 |\n| Dollar reel | 32 | $7.6M | $0.55M | $190.9 |\n| Hi-limit ($5+) | 22 | $4.4M | $0.32M | $161.6 |\n\n## Standouts\n- **Dragon Link bank (8 units, Bank 22):** Win/unit/day $187 — best in property, second consecutive quarter at the top. Confirms bank expansion hypothesis.\n- **Buffalo Link (12 units, Banks 3 & 19):** Steady, $138/u/d. Reliable.\n- **Hi-limit room ($5+):** Underperforming relative to physical space allocated. $162/u/d but floor footprint is ~8%.\n\n## Underperformers\n- **1¢ reel legacy machines (44 units):** Win/u/d $45 — half the property average. Average age 9 years. Strong recommendation to refresh — see \"Recommendations\" below.\n- **5¢ video:** Soft. Player preference clearly migrating to 1¢ video with higher max-bet ceilings.\n\n## Player behavior\n- Loyalty card-in penetration: 71% (target: 75%). Up from 66% prior quarter — loyalty refresh [[loyalty-tier-restructure]] is moving the number.\n- Average session length stable at 47 minutes.\n- Visitation: 132K visits, +2.4% YoY.\n\n## Recommendations\n1. **Expand Dragon Link bank from 8 to 12 units** by Q4 FY2026, displacing 4 underperforming 1¢ reel units. Estimated incremental theo: ~$240K annualized.\n2. **Refresh 1¢ reel legacy** — propose 20-unit refresh project. Will scope separately.\n3. **Hold hi-limit footprint flat** — do not expand until win/u/d crosses $200 consistently.\n4. **Continue loyalty tier work** — see [[loyalty-tier-restructure]].\n\n## Open questions for next review\n- Are we losing high-end play to competitors? Begin pulling regional Eilers data.\n- ATS cutovers for the [[backup-generator-kickoff]] project will affect October coin-in — model the impact before Q4 forecast lock.", "summary": "Q1 FY2026 slot performance: coin-in +3.8% YoY, theo win +5.1%, denomination mix shifting to penny video. Dragon Link bank is the clear standout; 1¢ video reels lagging and overdue for refresh.", "content_type": "intelligence", "logical_path": "performance/slots/q1-fy2026-review", "sensitivity": "operational", "department": null, "owner_id": "usr_xr_admin", "tags": ["slots", "performance", "q1-fy2026", "intelligence", "indian-head-casino"], "domain_meta": {}, "version": 1, "status": "published", "source": "web_ui", "created_by": "usr_xr_admin", "updated_by": "usr_xr_admin", "created_at": "2026-05-23T20:47:36.275962Z", "updated_at": "2026-05-23T20:47:36.275962Z", "claim_type": null, "source_confidence": null, "verification_status": null, "conflict_with": []}, {"id": "5e8d6313-5871-41d6-a8ad-399f2c2430c8", "org_id": "org_demo", "title": "PRIVATE - F&B Director Replacement Plan", "content": "# PRIVATE — F&B Director Replacement Plan\n\n**Author:** GM (me)\n**Audience:** me; share point-by-point with L. Carter (HR) only when ready to formalize\n**Sensitivity:** PRIVATE — do not share\n\n## Situation\nOur F&B director (P.M.) has been in seat ~26 months. The first 12 were fine. The last 12 have not been. I'm now at the point of needing to act, not just observe.\n\n## Specific concerns (documented)\n- **Equipment maintenance:** Three fryer incidents in six weeks. Two were preventable (PM schedule not run). Most recent on 2026-05-21 cost ~$340 in lost snack bar revenue and an unhappy lunch crowd.\n- **Snack bar turnover at 41% YTD** — the highest in the property. Exit interviews (per L. Carter) repeatedly cite scheduling chaos and unclear expectations from the director, not pay.\n- **Vendor management:** Sysco invoice variances unexplained for two consecutive months. Finance flagged it; P.M. has not closed the loop despite two reminders.\n- **Snack bar refresh project:** P.M. is the named owner of the [[snack-bar-refresh-proposal]] and has missed two internal deadlines. I have effectively been carrying the project.\n- **Engagement:** Not present on the floor during peak periods. Two department heads have privately mentioned it.\n\n## What I've already done\n- Two documented coaching conversations (2026-02-14, 2026-04-09). Notes with L. Carter.\n- 30/60/90 improvement expectations set in April — 30-day check showed no movement.\n\n## Options\n1. **Performance improvement plan (formal PIP)** — adds ~60 days of runway, low probability of turnaround given coaching history. Risk: snack bar refresh slips further.\n2. **Negotiated separation** — clean, preserves dignity, opens search now. My preference.\n3. **Termination for cause** — only if a discrete trigger event occurs. Not warranted today.\n\n## Succession\n- **Interim:** Sous chef (R. Aliyah) is strong, has informally been picking up slack. Promote to interim F&B manager (not director) on separation; 90-day evaluation.\n- **Permanent search:** L. Carter to engage HCS regional recruiter. Targeting 60-day search. Salary band needs to be revisited as part of [[fy2027-salary-planning]] — current band is below market for the property size.\n\n## Timing\n- Want to act after the Q2 TGC audit (see [[tgc-q2-audit-prep]]) — F&B is a routine audit area and a transition mid-audit is bad optics.\n- Target action window: 2026-06-22 → 2026-06-26.\n- Must complete BEFORE FY2027 comp messaging (see [[fy2027-salary-planning]]) so the snack bar team hears the news from new leadership.\n\n## Decision\nPending. I want to walk this through with L. Carter on 2026-05-27 (already on her calendar as \"1:1 — leadership\").\n\n## Reminder to self\nKeep this OUT of any shared meeting note. Reference only by handle.", "summary": "Confidential GM note: F&B director's performance no longer meeting bar. Documenting rationale, succession options, and timing to coordinate with HR before action.", "content_type": "daily", "logical_path": "private/personnel/fb-director-replacement", "sensitivity": "private", "department": null, "owner_id": "usr_xr_admin", "tags": ["personnel", "fb", "confidential", "private", "indian-head-casino"], "domain_meta": {}, "version": 1, "status": "published", "source": "web_ui", "created_by": "usr_xr_admin", "updated_by": "usr_xr_admin", "created_at": "2026-05-23T20:46:46.124956Z", "updated_at": "2026-05-23T20:46:46.124956Z", "claim_type": null, "source_confidence": null, "verification_status": null, "conflict_with": []}, {"id": "5bf1e817-0289-4810-b1c0-d4420f7e03e7", "org_id": "org_demo", "title": "HR Meeting - FY2027 Salary Increase Planning", "content": "# HR Meeting — FY2027 Salary Increase Planning\n\n**Date:** 2026-05-23\n**Time:** 10:00–11:45\n**Location:** GM office\n**Attendees:**\n- GM (me)\n- L. Carter — HR Director\n- T. Begay — Finance Director\n\n## Purpose\nSet direction on FY2027 (fiscal year starts 2026-10-01) merit / market adjustment budget ahead of tribal council budget submission due 2026-07-15.\n\n## Inputs reviewed\n- Regional comp study (Hospitality Compensation Advisors, refreshed 2026-04)\n- YTD turnover by department:\n  - Table games: 38% annualized (well above 22% regional benchmark)\n  - Surveillance: 31% annualized\n  - Slots: 19%\n  - F&B: 41% (skewed by snack bar; expected to soften post-refresh [[snack-bar-refresh-proposal]] and leadership change [[fb-director-replacement]])\n  - Cage: 12%\n- Current vs. market median (P50):\n  - Table games dealers: 11% below\n  - Surveillance operators: 9% below\n  - Slot attendants: at market\n  - Cooks (line): 6% below\n  - Cage cashiers: at market\n  - Salaried management: ~3% below\n\n## Direction set\n- **Overall merit pool:** 3.5% of payroll (vs. 2.75% FY2026). Tribal council appetite confirmed informally by chair last month.\n- **Weighted lifts (on top of merit):**\n  - Table games dealers: additional 4% market adjustment, bringing total ~7.5%\n  - Surveillance operators: additional 3% market adjustment, total ~6.5%\n  - Line cooks: additional 2%, total ~5.5%\n- **Salaried management:** standard 3.5% merit, no separate adjustment — to be revisited mid-year if turnover signals shift.\n- **Effective date:** 2026-10-15 (first pay period of new fiscal year, after the typical mid-month payroll cut).\n\n## Risks discussed\n- T. Begay flagged that total payroll lift lands around 4.2% all-in vs. the 3.0% placeholder in the prelim budget. Need to either reduce elsewhere or seek a higher council ceiling.\n- L. Carter raised internal-equity risk: a 7.5% lift for dealers vs. 3.5% for, say, cage cashiers will surface. Mitigation = clear comp-study messaging at all-staff post-approval.\n\n## Next steps\n- T. Begay: revise prelim budget by 2026-06-10, two scenarios (4.2% all-in vs. 3.5% all-in with smaller surveillance lift).\n- L. Carter: draft job-family talking points by 2026-06-15.\n- Me: pre-brief tribal council operations committee at June meeting; formal submission 2026-07-15.\n\n## Confidential note\nF&B leadership transition (see [[fb-director-replacement]]) needs to land before any F&B-wide comp messaging — sequencing matters.", "summary": "FY2027 salary planning with HR director. Set 3.5% merit pool target with weighted lift for table games dealers and surveillance, where comp study shows greatest market gap. Tribal council briefing required before finalization.", "content_type": "meeting", "logical_path": "meetings/hr/fy2027-salary-planning", "sensitivity": "strategic", "department": null, "owner_id": "usr_xr_admin", "tags": ["hr", "compensation", "salary-planning", "fy2027", "strategic", "indian-head-casino"], "domain_meta": {}, "version": 1, "status": "published", "source": "web_ui", "created_by": "usr_xr_admin", "updated_by": "usr_xr_admin", "created_at": "2026-05-23T20:46:22.625427Z", "updated_at": "2026-05-23T20:46:22.625427Z", "claim_type": null, "source_confidence": null, "verification_status": null, "conflict_with": []}, {"id": "e6fefa57-ceb8-442b-851b-42dc205da296", "org_id": "org_demo", "title": "Meeting Notes - Backup Generator Installation Kickoff", "content": "# Meeting Notes — Backup Generator Installation Kickoff\n\n**Date:** 2026-05-22\n**Time:** 08:30–10:00\n**Location:** Admin conference room\n**Attendees:**\n- GM (me)\n- D. Whitehorse — Tribal Facilities Director\n- J. Kessler — Cascade Mechanical (GC)\n- A. Brant — Cascade Mechanical (project manager)\n- R. Tom — Tribal Gaming Commission liaison (compliance observer)\n- S. Mendoza — Insurance / risk\n\n## Background\nTwo outages in the last 18 months (one ~40 min during a winter storm, one ~12 min from a substation event) exposed gaps in our generator coverage. Current single 500kW unit covers life-safety and partial floor only — we drop ~60% of slot floor in any extended outage.\n\n## Decisions\n- **Scope:** Install two new 750kW diesel generators with automatic transfer switches. Existing 500kW becomes tertiary backup, retained for life-safety dedicated.\n- **Coverage target:** 100% slot floor, 100% tables, 100% surveillance, 100% F&B refrigeration, all life-safety. Office HVAC excluded.\n- **Fuel:** 1,000-gal day tank per unit, 5,000-gal common bulk tank. ~72 hours full-load runtime.\n- **Vendor:** Cascade Mechanical confirmed as GC. Generators sourced through Kohler.\n\n## Timeline\n- Permitting + tribal council notice: complete by 2026-06-15\n- Site prep (pad, conduit, fuel tank): 2026-07-01 → 2026-08-15\n- Generator delivery: 2026-09-10 (Kohler lead time)\n- Install + commissioning: 2026-09-15 → 2026-10-30\n- Full ATS testing window: nights of 2026-10-26 / 27 (low-traffic Mon/Tue)\n\n## Floor-impact mitigation\n- All cutovers night-of-week, between 03:00–06:00.\n- Slot floor split into two electrical zones; only one zone offline at any cutover.\n- Marketing to NOT promote midweek events 10/26–10/27.\n\n## Budget\n- Hard cost: $1.42M\n- Contingency: 10% ($142K)\n- Tribal council approval secured at $1.6M in March; we are within envelope.\n\n## Open items\n- R. Tom to confirm TGC notification requirements for partial floor outages during cutover — by 2026-06-01.\n- S. Mendoza to update business interruption rider — by 2026-07-01.\n- I need to brief tribal council operations committee at June monthly — schedule via D. Whitehorse.\n\n## Next meeting\nBi-weekly cadence starting 2026-06-05, Fridays 09:00.", "summary": "Kickoff meeting for installation of two 750kW diesel backup generators serving casino floor and life-safety systems. Scope, timeline, and floor-impact mitigation agreed.", "content_type": "meeting", "logical_path": "meetings/facilities/backup-generator-project", "sensitivity": "project", "department": null, "owner_id": "usr_xr_admin", "tags": ["facilities", "construction", "backup-generators", "capex", "indian-head-casino", "project-kickoff"], "domain_meta": {}, "version": 1, "status": "published", "source": "web_ui", "created_by": "usr_xr_admin", "updated_by": "usr_xr_admin", "created_at": "2026-05-23T20:46:01.935378Z", "updated_at": "2026-05-23T20:46:01.935378Z", "claim_type": null, "source_confidence": null, "verification_status": null, "conflict_with": []}, {"id": "b19510c5-726b-469e-9690-52be80050eaa", "org_id": "org_demo", "title": "Daily GM Summary - 2026-05-23", "content": "# Daily GM Summary — Friday, 2026-05-23\n\n## Headline\nFriday came in strong — coin-in tracking +9% vs. forecast through 18:00; loyalty card-in at YTD high for a Friday. Two strategic meetings held, both with clean outcomes.\n\n## Gaming Floor\n- **Slots:** All banks up. Bank 22 (Dragon Link) running hot on attendance — confirms slot director's hypothesis from Q1 review [[q1-fy2026-slot-floor-review]].\n- **Tables:** All 12 open by 16:00 with full pit coverage. Weekend dealer schedule held.\n\n## F&B\n- Snack bar pacing to a strong Friday. Refresh proposal review draft circulated [[snack-bar-refresh-proposal]].\n\n## Key Meetings\n- **10:00** — FY2027 salary planning with HR director. Direction set on pool target and tier structure. See [[fy2027-salary-planning]].\n- **13:30** — Mother's Day promo postmortem with marketing. Mixed but actionable. See [[mothers-day-2026-recap]].\n- **15:00** — Compliance kickoff for Q2 Tribal Gaming Commission audit prep. See [[tgc-q2-audit-prep]].\n\n## Personnel\n- Final decision on F&B leadership in motion. See [[fb-director-replacement]] (private).\n- M. Reyes hire approved — start full schedule next pay period.\n\n## Outstanding\n- IGT contract renewal — final terms expected Monday. See [[igt-maintenance-renewal-2026]].\n- High Card Flush trial decision still needs final sign-off before Monday floor change [[high-card-flush-trial]].\n\n## Weekend\n- I'm on-call. Slot director has the floor; AGM covering swing both nights.", "summary": "Friday log: strong start to weekend, HR salary meeting held and direction set, Mother's Day promo recap reviewed, Gaming Commission audit prep launched.", "content_type": "daily", "logical_path": "daily/2026-05/2026-05-23", "sensitivity": "operational", "department": null, "owner_id": "usr_xr_admin", "tags": ["daily-summary", "gm-log", "operations", "indian-head-casino"], "domain_meta": {}, "version": 1, "status": "published", "source": "web_ui", "created_by": "usr_xr_admin", "updated_by": "usr_xr_admin", "created_at": "2026-05-23T20:45:41.533432Z", "updated_at": "2026-05-23T20:45:41.533432Z", "claim_type": null, "source_confidence": null, "verification_status": null, "conflict_with": []}, {"id": "97e03ee1-7e0c-4a28-8363-bee05f982573", "org_id": "org_demo", "title": "Daily GM Summary - 2026-05-22", "content": "# Daily GM Summary — Thursday, 2026-05-22\n\n## Headline\nSolid day. Coin-in back on forecast, +2.1% vs. same-Thursday last year. Backup generator project officially kicked off. One escalated security incident — handled, no PR exposure.\n\n## Gaming Floor\n- **Slots:** Full bank availability all day. Bank 7 stable after yesterday's repair.\n- **Tables:** Hold normalized (18.4%). Drop up modestly.\n- No hand-pays over $5K.\n\n## F&B\n- Fryer holding. Sysco delivery on time. Snack bar comping ran 4.2% — within target.\n\n## Key Meetings\n- **08:30** — Backup generator kickoff with Cascade Mechanical & tribal facilities. See [[backup-generator-kickoff]].\n- **14:00** — Prep session with HR director ahead of tomorrow's FY2027 salary planning. Pulled comp-study data, draft pool target.\n\n## Incidents\n- **21:35** — Intoxicated patron at north slot bank (Bank 14), refused beverage service, became verbally abusive to attendant. Security escorted out; trespass warning issued. Full write-up: [[security-incident-2026-05-22]].\n\n## Staffing\n- M. Reyes audition complete — recommending full hire (table games).\n- Two open positions still posted: line cook PM, slot attendant overnight.\n\n## Tomorrow\n- HR salary planning meeting 10:00\n- Walk floor with marketing on Mother's Day promo recap [[mothers-day-2026-recap]]", "summary": "Thursday log: backup generator kickoff held, coin-in recovered to forecast, intoxicated patron incident on north slot bank, HR salary planning prep complete.", "content_type": "daily", "logical_path": "daily/2026-05/2026-05-22", "sensitivity": "operational", "department": null, "owner_id": "usr_xr_admin", "tags": ["daily-summary", "gm-log", "operations", "indian-head-casino"], "domain_meta": {}, "version": 1, "status": "published", "source": "web_ui", "created_by": "usr_xr_admin", "updated_by": "usr_xr_admin", "created_at": "2026-05-23T20:45:37.795143Z", "updated_at": "2026-05-23T20:45:37.795143Z", "claim_type": null, "source_confidence": null, "verification_status": null, "conflict_with": []}, {"id": "20440f0b-6fa5-4b81-9682-f634ca4ca27b", "org_id": "org_demo", "title": "Daily GM Summary - 2026-05-21", "content": "# Daily GM Summary — Wednesday, 2026-05-21\n\n## Headline\nQuiet midweek. Coin-in tracked ~6% below forecast for the day; weather pulled regional drive-in traffic. No material safety or compliance issues.\n\n## Gaming Floor\n- **Slots:** 472 of 500 machines up at peak. Bank 7 (penny video) had 4 units down all morning — IGT tech on-site by 14:00, all back online by 16:30.\n- **Tables:** All 12 tables open evening shift. Blackjack hold ran hot (28%); 3-card poker slow.\n- **Notable jackpot:** $4,200 hand-pay on Buffalo Link Bank 3 at 19:47. Routine; no comp issue.\n\n## F&B\n- Snack bar main fryer tripped breaker at 11:15, down until 15:00. Limited menu posted; ~$340 estimated lost revenue. **This is the third fryer incident in six weeks** — see [[fb-director-replacement]].\n\n## Staffing\n- Two call-outs on swing (cocktail). Covered with OT.\n- New table games dealer (M. Reyes) finished week 1 of audition shifts — strong.\n\n## Incidents\n- Guest dispute at Bank 12 over disputed credit — surveillance confirmed machine paid correctly, guest accepted explanation.\n- Minor slip near restrooms (wet floor sign was up). No injury report filed; incident logged with risk mgmt.\n\n## Tomorrow\n- Backup generator kickoff meeting (see [[backup-generator-kickoff]])\n- Walk Q1 slot floor performance numbers with slot director before close", "summary": "Wednesday GM log: coin-in soft against forecast, mechanic call-out on Bank 7, snack bar fryer down 4 hours, two minor floor incidents resolved.", "content_type": "daily", "logical_path": "daily/2026-05/2026-05-21", "sensitivity": "operational", "department": null, "owner_id": "usr_xr_admin", "tags": ["daily-summary", "gm-log", "operations", "indian-head-casino"], "domain_meta": {}, "version": 1, "status": "published", "source": "web_ui", "created_by": "usr_xr_admin", "updated_by": "usr_xr_admin", "created_at": "2026-05-23T20:45:37.340701Z", "updated_at": "2026-05-23T20:45:37.340701Z", "claim_type": null, "source_confidence": null, "verification_status": null, "conflict_with": []}, {"id": "1da1be7e-dacf-4b3a-8b63-2c652ff0ff15", "org_id": "org_demo", "title": "Strategic Business Plan — Warm Springs Enterprise & Hospitality Group (FY 2025)", "content": "# Strategic Business Plan\n**Warm Springs Enterprise & Hospitality Group**\n*Enhancing Community, Culture, and Commerce*\n**Date: January 1, 2025**\n\n---\n\n## Vision, Mission & Values\n\n**Vision:** Create opportunities to ensure long-term stability and financial independence of team members, the Confederated Tribes of Warm Springs, and local communities.\n\n**Mission:** Hire exceptional, talented team members to provide excellent guest service — *Hospitality is our tradition.*\n\n**Product:** The experience — entertainment, dining, and amenities in a comfortable and fun atmosphere.\n\n**Values:**\n- **Teamwork** — Dedication, loyalty, communication, credibility, dependability, collaboration\n- **Respect** — Work/life balance, empathy, understanding, courtesy\n- **Integrity** — Honesty, professionalism, accountability, responsibility, trust\n- **Commitment** — Community, culture, pride, passion, diversity, tradition, friendliness, investing\n- **Change** — Continuous improvement, flexibility, growth\n\n---\n\n## Executive Summary\n\nThe Warm Springs Tribal Casino & Hospitality Group is dedicated to creating a thriving economic environment benefiting casino properties and the wider community. The vision is to empower team members and contribute positively to the Confederated Tribes of Warm Springs and local populace, fostering a culture of opportunity and support.\n\n---\n\n## Business Overview\n\n### 1. Indian Head Casino\n- **Current:** 6 table games, 480 gaming machines\n- **Expansion:** Increase table games to 10 (adding craps and roulette)\n- **Dining:** Transform into Tulle Sports Bar and Grill\n\n### 2. Plateau Travel Plaza\n- **Current:** 42 Class II slots\n- **Expansion:** Increase to 150 slots + complete renovation of store and dining facilities\n\n### 3. Future Development Ventures\n- Exploring land acquisition in **Bend, Oregon** for a Class III casino resort with full amenities\n- Adding a **100-room hotel** to the Indian Head property (coffee shop, swimming pool, arcade)\n\n---\n\n## Market Analysis\n\n- **Target Demographic:** Local residents, tourists, and visitors from neighboring regions\n- **Industry Trends:** Tribal gaming sector experiencing significant growth, driven by increased Oregon tourism and community-focused gaming interest\n- Top cities for rated accounts: Bend, Redmond, Madras\n\n---\n\n## Competitive Analysis\n\n- Wells Gaming Research conducted a detailed competitive analysis (Exhibit A)\n- Competitive advantages: strong community connection, culturally rich experiences, exceptional guest service commitment\n\n---\n\n## Marketing Strategy\n\n### Brand Positioning\nBrand reflects Confederated Tribes values — commitment to hospitality and community engagement.\n\n### Key Initiatives\n- **Loyalty Programs:** Structured incentives to encourage repeat visits\n- **Database Marketing:** Targeted communications with offer reinvestment optimization\n- **Digital Marketing:** Email, player portal, PWA mobile app\n- **Marketing Analytics:** Monthly reviews (3rd Thursday with GM and marketing team)\n\n### FY 2025 Revenue Target\nApproximately **$10.84M** — achievable via multiple growth pathways (ADT growth, frequency increase, database expansion).\n\n### Database Marketing Initiatives\n1. **Revised offer segmentation** — broader worth tiers with additional mid-level ($100–$499.99) segments for more precise reinvestment\n2. **Inactive player strategy (7–12 months)** — increased offer reinvestment, reduced to 2 offers/month\n3. **Low-frequency trip builder** — bi-weekly campaign for players averaging <2.5 days/month; 5% reinvestment on theoretical win\n4. **On-floor card enrollment program** — staff-led card issuance to unrated players\n5. **12+ month inactive reactivation** — bi-monthly communications to long-lapsed players (many lost post-2020 pandemic)\n\n### Digital Marketing Initiatives\n1. **Email expansion** — grow opt-in rate from 50.26% to 55%+ among 12-month active qualifiers\n2. **Player portal & PWA mobile app** — 24/7 account access (points, offers, tier status, win/loss forms); launching Q2 2025\n\n---\n\n## Operations Plan\n\n- **Staffing:** Prioritize local talent; ongoing training and development\n- **Training Programs:** Focus on customer service excellence and operational efficiency\n- **Facility Management:** Minimize disruptions during renovations and expansions\n\n---\n\n## Financial Plan\n\n- **Budgeting:** Detailed budget for renovations, equipment, and operational adjustments\n- **Revenue Forecasting:** Data analytics to project growth from historical performance and market trends\n- **Funding Sources:** Grants, partnerships, and investor exploration\n\n---\n\n## Community Engagement\n\n- Hiring priority from within the community; competitive wages and benefits\n- Community Advisory Board with local leaders and stakeholders\n- Quarterly town hall meetings\n- Job training and career programs for local residents\n- Sponsorship of cultural, educational, and recreational events\n- Monthly community newsletter\n- Sustainable practices integration\n- Continued education on Warm Springs culture and traditions\n\n---\n\n## SWOT Analysis\n\n**Strengths:**\n- Experienced and proactive team\n- Flexible, creative, diverse, compassionate\n- Tribal Council and business board support\n- Future vision and Kah-Nee-Ta connection\n- Strong location\n\n**Weaknesses:**\n- Lack of documentation\n- Lack of teamwork and communication\n- Shortage of qualified candidates\n- Gaming Commission licensing process delays\n- Lack of accountability\n- Organizational silos\n- Unclear organizational goals\n- Limited training space\n\n**Opportunities:**\n- Team reviews and performance improvement\n- Loyalty program growth\n- New technology (player portal, mobile app)\n- Player reactivation from post-pandemic inactive base\n- Bend, OR expansion and hotel development\n\n---\n\n## Quarterly Plan of Action (FY 2025)\n\n### Q1: Initial Setup and Planning\n- Finalize expansion plans for Indian Head Casino and Plateau Travel Plaza\n- Complete market and competitive analysis reports\n- Hire 50% of required staff; outline training programs\n- Implement database marketing strategy adjustments (core campaign + inactive strategy)\n\n### Q2: Implementation and Development\n- 50% completion of Indian Head Casino expansion\n- 50% completion of Plateau Travel Plaza expansion\n- Launch promotional activities; target 20% social media engagement increase and 15% community event attendance increase\n- Launch player portal and PWA mobile app\n- Implement comprehensive new-hire training\n\n### Q3: Mid-Year Review and Adjustments\n- Assess expansion progress; implement adjustments\n- Collect feedback from 500+ customers; implement top 3 suggestions\n- Enroll 1,000+ customers in loyalty programs\n- Financial plan review and additional funding exploration if needed\n\n### Q4: Finalization and Launch\n- 100% completion of both expansions\n- Begin planning for Bend, OR land acquisition and Indian Head hotel\n- Increase community engagement activities by 25%; support 3+ local initiatives\n- Year-end review and goal-setting for next year\n\n---\n\n## Leadership Training Program\n\n**Mission:** Equip aspiring leaders with essential skills, insights, and experiences needed to excel.\n\n**Vision:** Empower individuals to become transformative leaders who inspire innovation, foster collaboration, and drive positive change.\n\n**Why:** By investing in our team, we strengthen our enterprise, local communities, and the people of the Confederated Tribe of the Warm Springs.\n\n### Key Program Elements & Timeline\n| Element | Lead | Draft Due | Final Due |\n|---|---|---|---|\n| Mission, Vision, Values, Why | Design Team | — | Done |\n| Draft Program Plan | Raving | Feb 1 | Oct 1 |\n| Org Chart (job descriptions/hiring) | Kaitlyn, Shawn, Rachel, Margie | — | Jan 7 |\n| Training Journey with Manager Responsibilities | Kaitlyn, Nathan, Shawn, Rachele, Larra, Kevin, Myra, Esten, DW, Tim | Mar 28 | May 30 |\n| Tribal Member Development Program (Internships, Youth) | Lead: Margie; Janell, Aja, Rachel, Consultant Wayne | Jan 31 | Sep 30 |\n\n---\n\n## Source Document\nOriginal file: `archive/2026-05-23/Stategic Business Plan .docx`\n", "summary": "FY 2025 strategic business plan for Warm Springs Enterprise & Hospitality Group. Covers Indian Head Casino and Plateau Travel Plaza expansions, future Bend OR and hotel development, FY 2025 revenue target of ~$10.84M, database/digital marketing initiatives, SWOT, quarterly action plan, and leadership training program.", "content_type": "project", "logical_path": "strategy/business-plans", "sensitivity": "strategic", "department": null, "owner_id": "usr_xr_admin", "tags": ["business-plan", "warm-springs", "indian-head-casino", "plateau-travel-plaza", "FY2025", "expansion", "marketing", "tribal-gaming", "leadership"], "domain_meta": {}, "version": 1, "status": "published", "source": "web_ui", "created_by": "usr_xr_admin", "updated_by": "usr_xr_admin", "created_at": "2026-05-23T20:35:58.058757Z", "updated_at": "2026-05-23T20:35:58.058757Z", "claim_type": null, "source_confidence": null, "verification_status": null, "conflict_with": []}], "edges": [{"source_id": "b1f1f705-bf35-4481-8168-0baad7368df2", "target_id": "9c510c39-a1f3-40e5-a81f-191e525db7f5", "via": "wikilink"}, {"source_id": "54df3dea-f673-4688-b54e-a7fe97a9d21d", "target_id": "9c510c39-a1f3-40e5-a81f-191e525db7f5", "via": "wikilink"}, {"source_id": "54df3dea-f673-4688-b54e-a7fe97a9d21d", "target_id": "7fe3b1b0-6233-4747-a91f-7ef4415ca2e1", "via": "wikilink"}, {"source_id": "5417ca43-c99b-4aaa-99dc-7c752d272a0b", "target_id": "9c510c39-a1f3-40e5-a81f-191e525db7f5", "via": "wikilink"}, {"source_id": "8c1db9f4-5a4f-491c-8b97-01fe1dacea23", "target_id": "e53dea1e-f088-40e9-b553-306f71581a80", "via": "wikilink"}, {"source_id": "8c1db9f4-5a4f-491c-8b97-01fe1dacea23", "target_id": "8e2900fd-16e2-474e-bca2-a6299b929385", "via": "wikilink"}, {"source_id": "f51c2f52-f18c-4bab-87ea-84be92913c05", "target_id": "7fe3b1b0-6233-4747-a91f-7ef4415ca2e1", "via": "wikilin <script>
(function () {
  "use strict";

  const data = JSON.parse(document.getElementById("kb-data").textContent);
  const entries = data.entries;
  const edges = data.edges;

  // Build lookups.
  const byId = Object.fromEntries(entries.map(e => [e.id, e]));
  const outgoing = {};
  const incoming = {};
  for (const e of entries) { outgoing[e.id] = []; incoming[e.id] = []; }
  for (const edge of edges) {
    outgoing[edge.source_id].push(edge);
    incoming[edge.target_id].push(edge);
  }

  // Tag counts.
  const tagCounts = {};
  for (const e of entries) for (const t of (e.tags || [])) tagCounts[t] = (tagCounts[t] || 0) + 1;
  // Type counts.
  const typeCounts = {};
  for (const e of entries) typeCounts[e.content_type] = (typeCounts[e.content_type] || 0) + 1;

  // Render top stats.
  document.getElementById("stat-entries").textContent = entries.length;
  document.getElementById("stat-types").textContent = Object.keys(typeCounts).length;
  document.getElementById("stat-tags").textContent = Object.keys(tagCounts).length;
  document.getElementById("stat-links").textContent = edges.length;

  // State.
  const state = {
    activeType: null,
    activeTag: null,
    activePath: null,
    search: "",
  };

  // --- Filters UI ---
  function renderTypeFilters() {
    const root = document.getElementById("filter-types");
    root.innerHTML = "";
    const types = Object.keys(typeCounts).sort((a,b) => typeCounts[b]-typeCounts[a]);
    for (const t of types) {
      const el = document.createElement("span");
      el.className = "chip" + (state.activeType === t ? " active" : "");
      el.innerHTML = `${t}<span class="count">${typeCounts[t]}</span>`;
      el.onclick = () => { state.activeType = state.activeType === t ? null : t; goIndex(); };
      root.appendChild(el);
    }
  }
  function renderTagFilters() {
    const root = document.getElementById("filter-tags");
    root.innerHTML = "";
    const tags = Object.keys(tagCounts)
      .filter(t => tagCounts[t] >= 2)
      .sort((a,b) => tagCounts[b]-tagCounts[a]);
    for (const t of tags) {
      const el = document.createElement("span");
      el.className = "chip" + (state.activeTag === t ? " active" : "");
      el.innerHTML = `${t}<span class="count">${tagCounts[t]}</span>`;
      el.onclick = () => { state.activeTag = state.activeTag === t ? null : t; goIndex(); };
      root.appendChild(el);
    }
  }

  // --- Folder tree ---
  function buildTree() {
    const root = { children: {}, entries: [] };
    for (const e of entries) {
      const parts = e.logical_path.split("/");
      let node = root;
      for (let i = 0; i < parts.length - 1; i++) {
        const seg = parts[i];
        if (!node.children[seg]) node.children[seg] = { children: {}, entries: [] };
        node = node.children[seg];
      }
      node.entries.push(e);
    }
    return root;
  }
  function renderTree() {
    const root = document.getElementById("tree");
    root.innerHTML = "";
    const tree = buildTree();
    function render(node, path, container, level) {
      const segs = Object.keys(node.children).sort();
      for (const seg of segs) {
        const child = node.children[seg];
        const segPath = path ? path + "/" + seg : seg;
        const count = countNode(child);
        const details = document.createElement("details");
        if (level === 0) details.open = true;
        const summary = document.createElement("summary");
        summary.innerHTML = `<span class="seg">${escapeHtml(seg)}<span class="count">${count}</span></span>`;
        details.appendChild(summary);
        const childContainer = document.createElement("div");
        render(child, segPath, childContainer, level + 1);
        details.appendChild(childContainer);
        container.appendChild(details);
      }
      // leaf entries at this level
      for (const e of node.entries.sort((a,b) => a.title.localeCompare(b.title))) {
        const a = document.createElement("a");
        a.className = "leaf";
        a.href = "#/entry/" + e.id;
        a.textContent = e.title;
        container.appendChild(a);
      }
    }
    function countNode(n) {
      let c = n.entries.length;
      for (const k of Object.keys(n.children)) c += countNode(n.children[k]);
      return c;
    }
    render(tree, "", root, 0);
  }

  // --- Filtering ---
  function applyFilters(list) {
    return list.filter(e => {
      if (state.activeType && e.content_type !== state.activeType) return false;
      if (state.activeTag && !(e.tags || []).includes(state.activeTag)) return false;
      if (state.search) {
        const s = state.search.toLowerCase();
        const hay = (e.title + " " + (e.summary || "") + " " + e.content + " " + (e.tags||[]).join(" ")).toLowerCase();
        if (!hay.includes(s)) return false;
      }
      return true;
    });
  }

  // --- Routing ---
  function go() {
    const hash = location.hash.replace(/^#\/?/, "");
    if (hash.startsWith("entry/")) {
      const id = hash.slice("entry/".length);
      renderEntry(id);
    } else {
      renderIndex();
    }
    renderTypeFilters();
    renderTagFilters();
    renderTree();
  }
  function goIndex() { location.hash = "#/"; renderIndex(); renderTypeFilters(); renderTagFilters(); }

  // --- Index view ---
  function renderIndex() {
    const main = document.getElementById("main");
    const list = applyFilters(entries);
    list.sort((a,b) => b.updated_at.localeCompare(a.updated_at));

    const filterBadges = [];
    if (state.activeType) filterBadges.push(`<span class="chip active">type: ${state.activeType} <span class="count">×</span></span>`);
    if (state.activeTag) filterBadges.push(`<span class="chip active">tag: ${state.activeTag} <span class="count">×</span></span>`);
    if (state.search) filterBadges.push(`<span class="chip active">search: ${escapeHtml(state.search)}</span>`);

    let html = `
      <div class="breadcrumbs">
        <span>All entries</span>
        <span>·</span>
        <span>${list.length} of ${entries.length}</span>
      </div>

      <details class="helpbox">
        <summary>What this demo shows</summary>
        <p>
          This is a static snapshot of the live knowledge base — every entry is real,
          published content from the property's daily operations.
          Each <b>card</b> below is one entry. The <b>color tag</b> at the top of each card is the entry's
          <i>content type</i> (daily log, meeting note, project, decision, intelligence).
          The <b>path</b> in monospace is the entry's folder in the KB hierarchy. The <b>chips</b> are tags.
          The number in the top-right shows how many other entries this one links to or is linked from.
          Click any card to read the full entry, see related entries, and follow links.
        </p>
        <p>
          Use the left sidebar to filter by content type, by folder, by tag, or use
          <kbd>search</kbd> to query across all titles and content.
        </p>
      </details>

      <div class="graph-section">
        <h3>Link graph</h3>
        <p>
          Entries are nodes. A line means one entry references another — either by a
          markdown link or by a <code>[[wikilink]]</code> handle.
          Color = content type. Click any node to open that entry.
        </p>
        <svg class="graph" id="graph"></svg>
      </div>

      ${filterBadges.length ? `<div class="filter-row" style="margin-bottom:14px">${filterBadges.join("")}</div>` : ""}

      ${list.length === 0
        ? `<div class="empty">No entries match the current filters.</div>`
        : `<div class="grid">${list.map(renderCard).join("")}</div>`}
    `;
    main.innerHTML = html;

    renderGraph();
  }

  function renderCard(e) {
    const linkCount = outgoing[e.id].length + incoming[e.id].length;
    const tagsHtml = (e.tags || []).slice(0, 5).map(t => `<span class="tag">${escapeHtml(t)}</span>`).join("");
    return `
      <a class="card" href="#/entry/${e.id}" style="text-decoration:none;color:inherit;display:block">
        <span class="card-type t-${e.content_type}">${e.content_type}</span>
        ${e.sensitivity && e.sensitivity !== "operational" ? `<span class="sensitivity-badge s-${e.sensitivity}">${e.sensitivity}</span>` : ""}
        <div class="link-count">${linkCount > 0 ? `<b>${linkCount}</b> link${linkCount===1?"":"s"}` : ""}</div>
        <h2>${escapeHtml(decodeEntities(e.title))}</h2>
        <p class="summary">${escapeHtml(e.summary || "")}</p>
        <div class="meta">
          <span class="path">${escapeHtml(e.logical_path)}</span>
          <span>·</span>
          <span>${e.updated_at.slice(0,10)}</span>
        </div>
        <div class="tags">${tagsHtml}</div>
      </a>
    `;
  }

  // --- Entry detail view ---
  function renderEntry(id) {
    const main = document.getElementById("main");
    const e = byId[id];
    if (!e) {
      main.innerHTML = `<div class="empty">Entry not found. <a href="#/">Back to index</a></div>`;
      return;
    }
    const out = outgoing[id];
    const inc = incoming[id];

    main.innerHTML = `
      <div class="breadcrumbs">
        <a href="#/">All entries</a>
        <span>·</span>
        <span class="path" style="font-family:ui-monospace,monospace">${escapeHtml(e.logical_path)}</span>
      </div>

      <div class="entry-detail">
        <div class="entry-body" id="entry-body"></div>

        <div class="entry-meta">
          <h4>Type</h4>
          <dd><span class="card-type t-${e.content_type}">${e.content_type}</span></dd>

          <h4>Sensitivity</h4>
          <dd><span class="sensitivity-badge s-${e.sensitivity}">${e.sensitivity}</span></dd>

          <h4>Folder</h4>
          <dd class="path">${escapeHtml(e.logical_path)}</dd>

          <h4>Updated</h4>
          <dd>${e.updated_at.slice(0,10)} (v${e.version})</dd>

          <h4>Tags</h4>
          <dd>
            <div class="tags" style="display:flex;flex-wrap:wrap;gap:4px">
              ${(e.tags || []).map(t => `<span class="tag" style="padding:2px 8px;border-radius:999px;background:var(--bg-3);color:var(--muted);font-size:11px">${escapeHtml(t)}</span>`).join("")}
            </div>
          </dd>

          ${out.length > 0 ? `
            <h4>Links to (${out.length})</h4>
            <ul>
              ${out.map(edge => {
                const target = byId[edge.target_id];
                if (!target) return "";
                return `<li><a href="#/entry/${target.id}"><span class="ltype">${target.content_type} · ${edge.via}</span>${escapeHtml(decodeEntities(target.title))}</a></li>`;
              }).join("")}
            </ul>
          ` : ""}

          ${inc.length > 0 ? `
            <h4>Linked from (${inc.length})</h4>
            <ul>
              ${inc.map(edge => {
                const source = byId[edge.source_id];
                if (!source) return "";
                return `<li><a href="#/entry/${source.id}"><span class="ltype">${source.content_type} · ${edge.via}</span>${escapeHtml(decodeEntities(source.title))}</a></li>`;
              }).join("")}
            </ul>
          ` : ""}
        </div>
      </div>
    `;
    document.getElementById("entry-body").innerHTML = renderMarkdown(e.content, e.id);
    window.scrollTo(0, 0);
    document.querySelector("main.content").scrollTo(0, 0);
  }

  // --- Link graph (force layout, very small) ---
  function renderGraph() {
    const svg = document.getElementById("graph");
    if (!svg) return;
    const NS = "http://www.w3.org/2000/svg";
    const width = svg.clientWidth;
    const height = svg.clientHeight;

    // Only show entries with at least one edge to reduce clutter.
    const connected = new Set();
    for (const ed of edges) { connected.add(ed.source_id); connected.add(ed.target_id); }
    const nodes = entries.filter(e => connected.has(e.id)).map(e => ({
      id: e.id, title: e.title, type: e.content_type,
      x: width/2 + (Math.random()-0.5) * width * 0.6,
      y: height/2 + (Math.random()-0.5) * height * 0.6,
      vx: 0, vy: 0,
    }));
    const nodeMap = Object.fromEntries(nodes.map(n => [n.id, n]));
    const links = edges.filter(ed => nodeMap[ed.source_id] && nodeMap[ed.target_id]);

    // Simple force simulation.
    const ITERS = 220;
    const REPEL = 1800;
    const SPRING = 0.012;
    const SPRING_LEN = 90;
    const DAMP = 0.86;
    const CENTER = 0.005;

    for (let iter = 0; iter < ITERS; iter++) {
      for (const a of nodes) {
        let fx = (width/2 - a.x) * CENTER;
        let fy = (height/2 - a.y) * CENTER;
        for (const b of nodes) {
          if (a === b) continue;
          const dx = a.x - b.x, dy = a.y - b.y;
          const d2 = dx*dx + dy*dy + 0.01;
          const f = REPEL / d2;
          fx += dx / Math.sqrt(d2) * f;
          fy += dy / Math.sqrt(d2) * f;
        }
        a.vx = (a.vx + fx) * DAMP;
        a.vy = (a.vy + fy) * DAMP;
      }
      for (const l of links) {
        const a = nodeMap[l.source_id], b = nodeMap[l.target_id];
        const dx = b.x - a.x, dy = b.y - a.y;
        const d = Math.sqrt(dx*dx + dy*dy) + 0.01;
        const f = SPRING * (d - SPRING_LEN);
        const ux = dx/d, uy = dy/d;
        a.vx += ux * f; a.vy += uy * f;
        b.vx -= ux * f; b.vy -= uy * f;
      }
      for (const n of nodes) {
        n.x += n.vx; n.y += n.vy;
        n.x = Math.max(30, Math.min(width - 30, n.x));
        n.y = Math.max(20, Math.min(height - 20, n.y));
      }
    }

    // Color by type.
    const typeColors = {
      daily: "#3fb950",
      meeting: "#d29922",
      project: "#d2a8ff",
      decision: "#f85149",
      intelligence: "#39c5cf",
    };

    let s = "";
    for (const l of links) {
      const a = nodeMap[l.source_id], b = nodeMap[l.target_id];
      s += `<line class="edge" x1="${a.x}" y1="${a.y}" x2="${b.x}" y2="${b.y}" />`;
    }
    for (const n of nodes) {
      const c = typeColors[n.type] || "#8b949e";
      const r = 5 + Math.min(8, (outgoing[n.id].length + incoming[n.id].length));
      const label = n.title.length > 32 ? n.title.slice(0, 30) + "…" : n.title;
      s += `<g class="node" onclick="location.hash='#/entry/${n.id}'">
        <circle cx="${n.x}" cy="${n.y}" r="${r}" fill="${c}" fill-opacity="0.75" stroke="${c}"></circle>
        <text x="${n.x + r + 4}" y="${n.y + 3}">${escapeHtml(decodeEntities(label))}</text>
      </g>`;
    }
    svg.innerHTML = s;
  }

  // --- Markdown rendering (minimal, custom — no CDN) ---
  function renderMarkdown(md, ownerId) {
    // Normalize line endings.
    md = md.replace(/\r\n?/g, "\n");

    // Decode the few entities the source uses (e.g. &amp;).
    md = decodeEntities(md);

    // Code spans first (so we can put the placeholders back at the end).
    const codes = [];
    md = md.replace(/`([^`\n]+?)`/g, (_, code) => {
      codes.push(code);
      return `CODE${codes.length-1}`;
    });

    // Escape HTML on the remaining content.
    md = escapeHtml(md);

    // Tables.
    md = md.replace(/((?:^\|.*\n)+)/gm, (block) => {
      const lines = block.trim().split("\n");
      if (lines.length < 2) return block;
      // separator row check
      const sep = lines[1];
      if (!/^\|[\s\-:|]+\|$/.test(sep.trim())) return block;
      const header = splitRow(lines[0]);
      const align = splitRow(sep).map(c => {
        c = c.trim();
        if (c.startsWith(":") && c.endsWith(":")) return "center";
        if (c.endsWith(":")) return "right";
        return "left";
      });
      const rows = lines.slice(2).map(splitRow);
      let html = "<table><thead><tr>";
      for (let i = 0; i < header.length; i++) {
        html += `<th class="${align[i]==='right'?'num':''}" style="text-align:${align[i]}">${header[i]}</th>`;
      }
      html += "</tr></thead><tbody>";
      for (const r of rows) {
        html += "<tr>";
        for (let i = 0; i < r.length; i++) {
          html += `<td class="${align[i]==='right'?'num':''}" style="text-align:${align[i]}">${r[i]}</td>`;
        }
        html += "</tr>";
      }
      html += "</tbody></table>";
      return html + "\n";
    });
    function splitRow(line) {
      let l = line.trim();
      if (l.startsWith("|")) l = l.slice(1);
      if (l.endsWith("|")) l = l.slice(0, -1);
      return l.split("|").map(c => c.trim());
    }

    // Headings.
    md = md.replace(/^###### (.*)$/gm, "<h6>$1</h6>");
    md = md.replace(/^##### (.*)$/gm, "<h5>$1</h5>");
    md = md.replace(/^#### (.*)$/gm, "<h4>$1</h4>");
    md = md.replace(/^### (.*)$/gm, "<h3>$1</h3>");
    md = md.replace(/^## (.*)$/gm, "<h2>$1</h2>");
    md = md.replace(/^# (.*)$/gm, "<h1>$1</h1>");

    // Horizontal rules.
    md = md.replace(/^---+$/gm, "<hr />");

    // Bullet lists. Group consecutive lines starting with "- " or "* ".
    md = md.replace(/(?:^[-*] .*(?:\n|$))+?/gm, (block) => {
      const items = block.trim().split("\n").map(l => l.replace(/^[-*] /, ""));
      return "<ul>" + items.map(i => `<li>${i}</li>`).join("") + "</ul>\n";
    });
    // Numbered lists.
    md = md.replace(/(?:^\d+\. .*(?:\n|$))+?/gm, (block) => {
      const items = block.trim().split("\n").map(l => l.replace(/^\d+\. /, ""));
      return "<ol>" + items.map(i => `<li>${i}</li>`).join("") + "</ol>\n";
    });

    // Bold and italic.
    md = md.replace(/\*\*([^*\n]+?)\*\*/g, "<strong>$1</strong>");
    md = md.replace(/(^|[\s(])\*([^*\n]+?)\*(?=[\s).,!?]|$)/g, "$1<em>$2</em>");

    // Markdown links [text](url). Treat /kb/<id> as internal nav.
    md = md.replace(/\[([^\]]+)\]\(([^)]+)\)/g, (_, text, url) => {
      const m = url.match(/^\/kb\/([0-9a-f-]{36})/);
      if (m) {
        const t = byId[m[1]];
        return `<a class="wikilink" href="#/entry/${m[1]}">${text}${t ? "" : ""}</a>`;
      }
      const safe = url.replace(/"/g, "&quot;");
      return `<a href="${safe}" target="_blank" rel="noopener noreferrer">${text}</a>`;
    });

    // Wikilinks [[handle]]. Resolve via the same handle map the build uses.
    md = md.replace(/\[\[([^\]\|]+?)\]\]/g, (_, raw) => {
      const handle = raw.trim().toLowerCase();
      const targetId = resolveHandle(handle);
      if (targetId) {
        const t = byId[targetId];
        return `<a class="wikilink" href="#/entry/${targetId}">${escapeHtml(decodeEntities(t.title))}</a>`;
      }
      return `<span class="wikilink broken" title="No entry matches this handle">${escapeHtml(raw)}</span>`;
    });

    // Paragraphs: wrap orphan text blocks.
    const parts = md.split(/\n{2,}/);
    md = parts.map(p => {
      const t = p.trim();
      if (!t) return "";
      // Already an HTML block?
      if (/^<(h\d|ul|ol|table|hr|blockquote|p|div)/.test(t)) return t;
      return `<p>${t.replace(/\n/g, "<br/>")}</p>`;
    }).join("\n");

    // Restore code spans.
    md = md.replace(/CODE(\d+)/g, (_, i) => `<code>${escapeHtml(codes[+i])}</code>`);

    return md;
  }

  // Build the wikilink resolver client-side too.
  const handleMap = (function () {
    const m = {};
    for (const e of entries) {
      const last = e.logical_path.split("/").pop();
      if (last) m[last.toLowerCase()] = e.id;
      const slug = e.title.toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, "");
      if (!(slug in m)) m[slug] = e.id;
    }
    return m;
  })();
  const handleKeys = Object.keys(handleMap);
  function resolveHandle(handle) {
    if (handle in handleMap) return handleMap[handle];
    let best = { score: 0, key: null };
    for (const k of handleKeys) {
      if (handle.startsWith(k) || k.startsWith(handle)) {
        const score = Math.min(handle.length, k.length);
        if (score > best.score) best = { score, key: k };
      }
    }
    if (best.key && best.score >= 6) return handleMap[best.key];
    return null;
  }

  function escapeHtml(s) {
    return String(s)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#39;");
  }
  function decodeEntities(s) {
    return String(s)
      .replace(/&amp;/g, "&")
      .replace(/&lt;/g, "<")
      .replace(/&gt;/g, ">")
      .replace(/&quot;/g, '"')
      .replace(/&#39;/g, "'");
  }

  // Search wiring.
  document.getElementById("search").addEventListener("input", (ev) => {
    state.search = ev.target.value.trim();
    if (location.hash.startsWith("#/entry/")) location.hash = "#/";
    else renderIndex();
  });

  window.addEventListener("hashchange", go);
  go();
})();
</script>
</body>
</html>
