<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Knowledge Base — Indian Head Casino · Demo</title>
<style>
  :root {
    --bg: #0e1117;
    --bg-2: #161b22;
    --bg-3: #1f242c;
    --border: #2a313c;
    --text: #e6edf3;
    --muted: #8b949e;
    --accent: #58a6ff;
    --accent-2: #d2a8ff;
    --green: #3fb950;
    --orange: #d29922;
    --red: #f85149;
    --pink: #f778ba;
    --teal: #39c5cf;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #ffffff;
      --bg-2: #f6f8fa;
      --bg-3: #eaeef2;
      --border: #d0d7de;
      --text: #1f2328;
      --muted: #59636e;
      --accent: #0969da;
      --accent-2: #8250df;
      --green: #1a7f37;
      --orange: #9a6700;
      --red: #cf222e;
      --pink: #bf3989;
      --teal: #1b7c83;
    }
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    font: 14px/1.55 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
  }
  header.topbar {
    border-bottom: 1px solid var(--border);
    background: var(--bg-2);
    padding: 14px 20px;
    display: flex; align-items: center; gap: 16px;
  }
  header.topbar h1 {
    font-size: 17px; margin: 0; font-weight: 600; letter-spacing: -0.01em;
  }
  header.topbar .subtitle {
    color: var(--muted); font-size: 13px;
  }
  header.topbar .stats {
    margin-left: auto;
    display: flex; gap: 18px;
    color: var(--muted); font-size: 12px;
  }
  header.topbar .stats b { color: var(--text); font-weight: 600; font-size: 14px; }

  .layout {
    display: grid;
    grid-template-columns: 280px 1fr;
    height: calc(100vh - 53px);
  }
  aside.sidebar {
    border-right: 1px solid var(--border);
    background: var(--bg-2);
    overflow-y: auto;
    padding: 16px 14px 80px;
  }
  aside.sidebar h3 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
    margin: 18px 0 8px;
    font-weight: 600;
  }
  aside.sidebar h3:first-child { margin-top: 0; }
  .filter-row {
    display: flex; flex-wrap: wrap; gap: 6px;
  }
  .chip {
    font-size: 12px;
    padding: 3px 9px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: var(--bg-3);
    color: var(--text);
    cursor: pointer;
    user-select: none;
  }
  .chip:hover { border-color: var(--accent); color: var(--accent); }
  .chip.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
  .chip .count { color: var(--muted); margin-left: 4px; font-variant-numeric: tabular-nums; }
  .chip.active .count { color: rgba(255,255,255,0.85); }

  .tree { font-size: 13px; }
  .tree details { margin: 2px 0; }
  .tree summary {
    cursor: pointer;
    padding: 2px 4px;
    border-radius: 4px;
    list-style: none;
  }
  .tree summary::-webkit-details-marker { display: none; }
  .tree summary:hover { background: var(--bg-3); }
  .tree summary::before {
    content: "▸";
    display: inline-block;
    width: 14px;
    color: var(--muted);
    transition: transform 0.15s;
  }
  .tree details[open] > summary::before { transform: rotate(90deg); }
  .tree .seg { color: var(--text); font-weight: 500; }
  .tree .seg .count { color: var(--muted); font-weight: 400; font-size: 11px; margin-left: 4px; }
  .tree .leaf {
    margin-left: 18px;
    padding: 2px 6px;
    border-radius: 4px;
    cursor: pointer;
    color: var(--muted);
    display: block;
    text-decoration: none;
    border-left: 2px solid transparent;
  }
  .tree .leaf:hover { background: var(--bg-3); color: var(--text); }
  .tree .leaf.active { color: var(--text); border-left-color: var(--accent); background: var(--bg-3); }

  .search-input {
    width: 100%;
    padding: 7px 10px;
    background: var(--bg-3);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font: inherit;
    font-size: 13px;
  }
  .search-input:focus { outline: none; border-color: var(--accent); }

  main.content {
    overflow-y: auto;
    padding: 24px 32px 80px;
  }
  .breadcrumbs {
    color: var(--muted);
    font-size: 12px;
    margin-bottom: 14px;
    display: flex; gap: 8px; align-items: center;
  }
  .breadcrumbs a { color: var(--accent); text-decoration: none; cursor: pointer; }
  .breadcrumbs a:hover { text-decoration: underline; }

  /* Index card grid */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
    gap: 14px;
  }
  .card {
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    cursor: pointer;
    transition: border-color 0.15s, transform 0.15s;
    position: relative;
  }
  .card:hover { border-color: var(--accent); transform: translateY(-1px); }
  .card .card-type {
    display: inline-block;
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding: 2px 7px;
    border-radius: 4px;
    font-weight: 600;
    margin-bottom: 8px;
  }
  .card h2 {
    margin: 0 0 6px;
    font-size: 15px;
    line-height: 1.35;
    font-weight: 600;
    letter-spacing: -0.005em;
  }
  .card p.summary {
    margin: 0 0 10px;
    color: var(--muted);
    font-size: 12.5px;
    line-height: 1.5;
  }
  .card .meta {
    display: flex; gap: 10px; flex-wrap: wrap;
    color: var(--muted); font-size: 11px;
  }
  .card .meta .path { font-family: ui-monospace, SFMono-Regular, monospace; }
  .card .tags { margin-top: 8px; display: flex; flex-wrap: wrap; gap: 4px; }
  .card .tag {
    font-size: 10.5px;
    padding: 1px 6px;
    border-radius: 4px;
    background: var(--bg-3);
    color: var(--muted);
  }
  .card .link-count {
    position: absolute;
    top: 12px; right: 14px;
    font-size: 11px;
    color: var(--muted);
  }
  .card .link-count b { color: var(--accent); }

  /* Type colors */
  .t-daily        { background: rgba(63,185,80,0.18);  color: var(--green); }
  .t-meeting      { background: rgba(210,153,34,0.18); color: var(--orange); }
  .t-project      { background: rgba(210,168,255,0.18); color: var(--accent-2); }
  .t-decision     { background: rgba(248,81,73,0.18);  color: var(--red); }
  .t-intelligence { background: rgba(57,197,207,0.18); color: var(--teal); }

  /* Entry detail */
  .entry-detail {
    max-width: 900px;
    display: grid;
    grid-template-columns: 1fr 260px;
    gap: 32px;
    align-items: start;
  }
  .entry-body { min-width: 0; }
  .entry-meta {
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    font-size: 12.5px;
    position: sticky; top: 0;
  }
  .entry-meta h4 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
    margin: 14px 0 6px;
    font-weight: 600;
  }
  .entry-meta h4:first-child { margin-top: 0; }
  .entry-meta dl { margin: 0; }
  .entry-meta dt { color: var(--muted); font-size: 11px; }
  .entry-meta dd { margin: 0 0 8px; word-break: break-word; }
  .entry-meta dd.path { font-family: ui-monospace, SFMono-Regular, monospace; font-size: 12px; }
  .entry-meta ul { list-style: none; margin: 0; padding: 0; }
  .entry-meta li { margin: 4px 0; }
  .entry-meta li a {
    color: var(--text);
    text-decoration: none;
    display: block;
    padding: 5px 7px;
    border-radius: 4px;
    border-left: 2px solid var(--accent);
    background: var(--bg-3);
    font-size: 12px;
    line-height: 1.35;
  }
  .entry-meta li a:hover { background: var(--border); }
  .entry-meta li a .ltype {
    display: block;
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 2px;
  }

  .entry-body h1 {
    font-size: 26px;
    margin: 0 0 8px;
    line-height: 1.2;
    letter-spacing: -0.015em;
  }
  .entry-body h2 {
    font-size: 18px;
    margin: 26px 0 10px;
    padding-bottom: 5px;
    border-bottom: 1px solid var(--border);
  }
  .entry-body h3 { font-size: 15px; margin: 20px 0 6px; }
  .entry-body p, .entry-body ul, .entry-body ol { margin: 0 0 12px; }
  .entry-body ul, .entry-body ol { padding-left: 24px; }
  .entry-body li { margin: 4px 0; }
  .entry-body code {
    background: var(--bg-3);
    padding: 1.5px 5px;
    border-radius: 3px;
    font-size: 90%;
    font-family: ui-monospace, SFMono-Regular, monospace;
  }
  .entry-body table {
    border-collapse: collapse;
    margin: 12px 0;
    font-size: 13px;
    width: 100%;
  }
  .entry-body th, .entry-body td {
    border: 1px solid var(--border);
    padding: 5px 10px;
    text-align: left;
  }
  .entry-body th { background: var(--bg-3); font-weight: 600; }
  .entry-body td.num, .entry-body th.num { text-align: right; font-variant-numeric: tabular-nums; }
  .entry-body a { color: var(--accent); text-decoration: none; }
  .entry-body a:hover { text-decoration: underline; }
  .entry-body a.wikilink {
    color: var(--accent-2);
    background: rgba(210,168,255,0.10);
    padding: 0 4px;
    border-radius: 3px;
  }
  .entry-body a.wikilink.broken {
    color: var(--muted);
    background: transparent;
    border-bottom: 1px dotted var(--muted);
    cursor: not-allowed;
  }
  .entry-body hr {
    border: none;
    border-top: 1px solid var(--border);
    margin: 22px 0;
  }
  .entry-body blockquote {
    border-left: 3px solid var(--border);
    margin: 12px 0;
    padding: 4px 14px;
    color: var(--muted);
  }

  .sensitivity-badge {
    display: inline-block;
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding: 2px 8px;
    border-radius: 4px;
    font-weight: 600;
    margin-left: 8px;
    vertical-align: middle;
  }
  .s-operational { background: var(--bg-3); color: var(--muted); }
  .s-project     { background: rgba(210,168,255,0.18); color: var(--accent-2); }
  .s-strategic   { background: rgba(57,197,207,0.18); color: var(--teal); }
  .s-private     { background: rgba(248,81,73,0.22); color: var(--red); }

  .empty {
    color: var(--muted);
    text-align: center;
    padding: 60px 20px;
    font-size: 14px;
  }

  /* Mini graph */
  .graph-section {
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 18px;
    margin-bottom: 22px;
  }
  .graph-section h3 {
    margin: 0 0 10px;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
  }
  .graph-section p {
    margin: 0 0 8px;
    font-size: 12.5px;
    color: var(--muted);
  }
  svg.graph { width: 100%; height: 380px; display: block; }
  svg.graph .node circle {
    cursor: pointer;
    stroke-width: 1.5;
    transition: r 0.15s;
  }
  svg.graph .node:hover circle { stroke: var(--accent); stroke-width: 2.5; }
  svg.graph .node text {
    fill: var(--text);
    font-size: 10.5px;
    pointer-events: none;
  }
  svg.graph line.edge {
    stroke: var(--border);
    stroke-width: 1;
  }

  details.helpbox {
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
    margin-bottom: 18px;
    font-size: 13px;
  }
  details.helpbox summary {
    cursor: pointer;
    font-weight: 600;
    color: var(--text);
  }
  details.helpbox p { margin: 8px 0 0; color: var(--muted); font-size: 13px; line-height: 1.6; }
  details.helpbox kbd {
    background: var(--bg-3);
    padding: 1px 6px;
    border-radius: 3px;
    font-size: 11.5px;
    font-family: ui-monospace, monospace;
  }

  @media (max-width: 900px) {
    .layout { grid-template-columns: 220px 1fr; }
    aside.sidebar { padding: 12px 10px 60px; }
    main.content { padding: 18px 18px 60px; }
    .entry-detail { grid-template-columns: 1fr; }
    .entry-meta { position: static; }
    header.topbar { flex-wrap: wrap; gap: 8px 16px; padding: 10px 14px; }
    header.topbar .subtitle { width: 100%; order: 3; }
    header.topbar .stats { margin-left: 0; }
    .grid { grid-template-columns: 1fr; }
    svg.graph { height: 320px; }
  }
</style>

<script type="application/json" id="kb-data">{"entries": [{"id": "b1f1f705-bf35-4481-8168-0baad7368df2", "org_id": "org_demo", "title": "Snack Bar Daily - Sara Garcia - 2026-05-23", "content": "# Snack Bar Daily — Sara Garcia — Friday, 2026-05-23\n\n**Author:** Sara Garcia, Snack Bar Manager\n\n## Strong Friday\nBest lunch we've had in three weeks. Tickets per hour averaged 47 from 11:30-13:30 (target 38). Fryer held. Both slushie machines holding. Marcus was a one-man machine on the grill. Tina was on the front counter — she remembers half our regulars by name and it shows in the tips.\n\n## Equipment update\n- **Ice machine** making the rattling noise again. Maintenance says it's the auger but they want to \"let it run until it dies\" because it's on the replacement list in the [[snack-bar-refresh-proposal]] anyway. Fine — but if it fails mid-Saturday I'm going to be very vocal.\n- **POS card reader at register 2** is flaky — about 1 in 8 transactions need to be re-swiped. Tickets in to IT.\n- Replaced the third fryer's old gasket while I had a quiet moment after lunch. Maintenance said it doesn't matter, but I know it does.\n\n## Staffing\n- **New cashier (Jenna) starts Monday** — I'm running her week-1 orientation myself. Sent her the handbook + my \"first week\" cheat sheet.\n- **Maria's references came back glowing.** I'm going to recommend her to F&B director — but if he doesn't push the hire through by EOW next week I'm going to escalate to GM via Eric. We can't keep limping along on OT.\n- Diego came in on time, smile on his face. Whatever the new arrangement is, it's working.\n\n## Customer feedback\n**Positive:**\n- A whole busload of seniors came in around 15:00 and loved everything. The bus driver tipped us $20 cash for \"running a clean and friendly counter.\" Best compliment I've gotten this month.\n- Tina got asked out by a regular. She declined politely. The regular handled it well. Adult behavior all around — file under \"miracles.\"\n- Snack bar revenue tracking +18% Friday-to-date vs. same Friday LY. Some of that is the marketing pull (Father's Day pre-roll up, Mustang post-event mailer drops tomorrow).\n\n**Negative:**\n- One refund — a kid's combo came out wrong (nuggets instead of tenders). Mom was very nice about it. Comped a slushie.\n- A guy at 17:30 was upset that we don't take Apple Pay at register 2 — but we do at register 1. Long story (same hardware, register 2's network port is flaky — see above). Sent him to register 1, he was fine.\n- One comment card about the breakroom being visible from the dining area when we have the door open. Easy fix — keep door closed during peak. Trained team.\n\n## Refresh project\n**Eric Kim sent me the v3 draft of [[snack-bar-refresh-proposal]] for review this afternoon.** My notes:\n- Drop chili-cheese fries: yes, agree (top waste, third complaint magnet)\n- Drop breakfast burrito: yes, agree (rubbery after 30 min, food safety adjacent)\n- Add bowls: yes — but the prep line as drawn doesn't have room. Need a dedicated station.\n- Add rapid-cook oven: YES. Game changer for grab-and-go.\n- Closure window 2026-07-13 → 2026-07-17 — I want to be on-site during overnight install. I want hands on the new line before opening.\n- Sysco equipment quote — I haven't seen it. Asking Eric Monday.\n- Concert series support: the June show comes BEFORE the install. We'll need a concession trailer for that one.\n\nWill type up notes this weekend and send to Eric and F&B director by Monday AM.\n\n## Weekend\n- I'm closing Saturday night, opening Sunday.\n- AGM has my number for emergencies.\n- Marcus is on the schedule both days. He'll be fine.", "summary": "Sara Garcia's Friday log: strong lunch (47 tickets/hr peak), ice machine on borrowed time, POS reader at register 2 flaky, busload of seniors loved everything, refresh proposal v3 review with notes for Eric.", "content_type": "daily", "logical_path": "snack-bar/daily/2026-05/2026-05-23-sara-garcia", "sensitivity": "operational", "department": null, "owner_id": "usr_xr_admin", "tags": ["daily-summary", "snack-bar", "sara-garcia", "fb", "operations", "indian-head-casino"], "domain_meta": {}, "version": 1, "status": "published", "source": "web_ui", "created_by": "usr_xr_admin", "updated_by": "usr_xr_admin", "created_at": "2026-05-23T21:05:52.556202Z", "updated_at": "2026-05-23T21:05:52.556202Z", "claim_type": null, "source_confidence": null, "verification_status": null, "conflict_with": []}, {"id": "54df3dea-f673-4688-b54e-a7fe97a9d21d", "org_id": "org_demo", "title": "Snack Bar Daily - Sara Garcia - 2026-05-22", "content": "# Snack Bar Daily — Sara Garcia — Thursday, 2026-05-22\n\n**Author:** Sara Garcia, Snack Bar Manager\n\n## The fryer is holding\nKnock on wood. Did a manual cleaning at open and watched the contactor through breakfast. No tripping today. Not relaxing yet — fool me three times etc.\n\n## Sysco delivery\nCame in at 0710, almost a full count this time. Short one case of mozzarella sticks (we'll be out by Saturday at this pace). Driver said they're back-ordered until next Tuesday. This actually feeds back to the [[snack-bar-refresh-proposal]] — switching to a smaller portion would help both margin AND availability. Adding to my refresh notes.\n\n## Staffing\n- **Diego came in. We had The Conversation.** He's getting two consecutive Tuesdays off so he can do hospital runs without calling out — in exchange he commits to no surprise no-shows. He cried. I almost did too. I'm not writing him up. Yet.\n- Tina got the day off (deserved).\n- **Marcus opened solo and crushed it.** He's ready for a lead role when the refresh project opens one — putting this in his next 1:1.\n- **Interviewed Maria at 14:00** for PM line cook. Used to work the Hilton bar grill. She's interested, asking for $2/hr above our posted band. References check Monday — I think she's worth it.\n\n## Equipment\n- **Slushie machine #2 syrup line clog** — manually cleared. Third time this month on that line. Looking at replacement parts.\n- Ice machine making the rattling noise again. Maintenance says auger, they want to let it run until it dies because it's on the refresh replacement list.\n- Both fryers, grill, and reach-in cooler all behaving today.\n\n## Customer feedback\n**Positive:**\n- Two Father's Day inquiries already — \"is the snack bar gonna be open Sunday June 21?\" Yes, Sunday hours, 10am-10pm same as always. People are coming.\n- A guy thanked Marcus for the \"perfect grilled cheese.\" Marcus told me he made it \"just like his mom's.\" Marcus's mom raised him in Sacramento so I don't know what that has to do with grilled cheese but the customer loved it.\n- Repeat-comp count is up this week (cashiers track on the iPad). People keep coming back.\n\n**Negative:**\n- One comment card about the breakfast burrito being \"rubbery.\" Order time was 11:45 — breakfast burritos that sit are not great. That's the menu, not the cook. Another reason to drop it in the refresh.\n- Complaint at 18:30 — a guy on a Diamond card said combo prices are higher than last year. He's right (we repriced in February). I gave him a free slushie. He left happy.\n- Cashier mismeasured a guest's senior discount — caught at refund. Reviewing with Jenna's onboarding next week so she doesn't repeat it.\n\n## Visit from Marketing\n**Eric Kim came by around 14:00** to ask about how the floor was running. Wanted to know if we'd be ready to support the summer concerts [[summer-concert-series-2026]]. Honestly? With our current equipment, no. We'd need an outdoor concession trailer at minimum for the June show — current snack bar can't handle a 1,800-person event window. I told him exactly that. He took notes.\n\n## End of day\nF&B director was in for the morning, gone by 14:00. I think there was a leadership meeting but I wasn't in it. R. Aliyah didn't know either.\n\n## Tomorrow\n- Friday — usually busy\n- Schedule walk-through with Marcus\n- Refresh project punch list — I'm trying to be Eric's eyes-on-the-ground here since F&B director keeps dropping the ball on it", "summary": "Sara Garcia's Thursday log: fryer held, Diego conversation went well, interviewed Maria for PM cook, slushie syrup line clog, Eric Kim came by about concert support, mozzarella stick shortage on Sysco delivery.", "content_type": "daily", "logical_path": "snack-bar/daily/2026-05/2026-05-22-sara-garcia", "sensitivity": "operational", "department": null, "owner_id": "usr_xr_admin", "tags": ["daily-summary", "snack-bar", "sara-garcia", "fb", "operations", "indian-head-casino"], "domain_meta": {}, "version": 1, "status": "published", "source": "web_ui", "created_by": "usr_xr_admin", "updated_by": "usr_xr_admin", "created_at": "2026-05-23T21:05:36.010328Z", "updated_at": "2026-05-23T21:05:36.010328Z", "claim_type": null, "source_confidence": null, "verification_status": null, "conflict_with": []}, {"id": "5417ca43-c99b-4aaa-99dc-7c752d272a0b", "org_id": "org_demo", "title": "Snack Bar Daily - Sara Garcia - 2026-05-21", "content": "# Snack Bar Daily — Sara Garcia — Wednesday, 2026-05-21\n\n**Author:** Sara Garcia, Snack Bar Manager\n\n## The fryer again\nThe big one tripped the breaker at 11:15, right as the lunch rush was rolling in. Same fryer that's been giving us trouble for six weeks. Marcus yelled from the line, I dropped my paperwork, ran out.\n\nPulled the limited-menu placard — I had it laminated last month because I was so tired of remaking it. Cold sandwiches, salads, slushies. No fries, no tenders, no jojos. Maintenance had someone over by 13:30, said it was the contactor again. Replaced it — third time on the same part this year. I keep telling them it's a wiring issue upstream but nobody listens. Back online at 15:00.\n\nCasino estimates we lost ~$340 in revenue. Closer to $500 if you count the people who walked away and the comps I gave out. Seven free slushies just to keep the toddlers from melting down while their grandmas were still gambling.\n\n## Staffing\n- **Diego called out again.** Third time this month. He has a kid in the hospital but at some point I need to write him up or I'll burn out Tina.\n- **Tina worked the open-to-close double** — second one this week. Getting nervous about losing her too. Bought her dinner from the line.\n- **PM line cook position still open.** Two no-shows for interviews this week. Posting is over six weeks old.\n- New cashier (Jenna) starts Monday — first new hire in two months.\n\n## Customer feedback\n**Positive:**\n- Mrs. Patterson (regular) brought me a thank-you card for remembering her grandson is dairy-free. She tips with carnations from her garden — sweet, but I'm now drowning in them.\n- Comment card: \"Best snack bar I've eaten at in any casino — please tell the woman behind the counter she's amazing.\" (Tina found it in the box. We both cried a little.)\n\n**Negative:**\n- A guy complained about the limited menu at 12:30 even after I explained the fryer. Wanted to talk to the manager. I said \"you're talking to her.\" He left without ordering — Diamond card, name in CRM. K. Smith (PD) should probably know.\n- Two comment cards calling the chili-cheese fries \"soggy.\" Honestly, they always have been. The refresh project [[snack-bar-refresh-proposal]] drops them. Can't come soon enough.\n- Wait times over 15 min at peak (one-fryer day). Three verbal complaints to me directly.\n\n## End of day\nPulled labor down to 1.6% over target by sending Marcus home at 21:00 instead of 22:00. F&B director was out today (PTO again) so I sent the daily report straight to the GM's office and copied R. Aliyah (sous chef) on the order list.\n\n## Tomorrow\n- Sysco delivery 0700 — need to be here for the count, last week's order was short two cases of buns\n- Schedule final review for next pay period\n- Talk to Diego about attendance", "summary": "Sara Garcia's Wednesday log: main fryer down 11:15-15:00 (contactor again), Diego called out third time this month, customer thank-you card, Diamond cardholder complaint about limited menu.", "content_type": "daily", "logical_path": "snack-bar/daily/2026-05/2026-05-21-sara-garcia", "sensitivity": "operational", "department": null, "owner_id": "usr_xr_admin", "tags": ["daily-summary", "snack-bar", "sara-garcia", "fb", "operations", "indian-head-casino"], "domain_meta": {}, "version": 1, "status": "published", "source": "web_ui", "created_by": "usr_xr_admin", "updated_by": "usr_xr_admin", "created_at": "2026-05-23T21:05:17.659996Z", "updated_at": "2026-05-23T21:05:17.659996Z", "claim_type": null, "source_confidence": null, "verification_status": null, "conflict_with": []}, {"id": "8c1db9f4-5a4f-491c-8b97-01fe1dacea23", "org_id": "org_demo", "title": "Local Market Competitive Scan - Q2 2026", "content": "# Local Market Competitive Scan — Q2 2026\n\n**Author:** Eric Kim, Marketing Director\n**Method:** Mystery-shopper visits, social listening, regional Eilers data Q1, player exit surveys\n**Sensitivity:** Strategic — share only with GM, AGM, and tribal council operations committee\n\n## Scope\nThe two competitors who materially share our drive-time radius:\n\n### Wildhorse Resort & Casino (Pendleton, ~40mi)\n- ~1,200 slot machines, full table games, hotel, two restaurants\n- Different segment than us (destination resort) but pulls overlapping local players\n\n### Three Rivers Casino (Florence, ~60mi but a longer drive over the mountains, marginal overlap)\n- ~700 slots, smaller scale, more comparable to us\n- Has been investing in marketing aggressively\n\n## What they're doing\n\n### Wildhorse\n- **New machines aggressive:** Mystery shop on 2026-05-08 counted 84 machines on their floor that have hit our regional market within the last 90 days. They are buying ahead of replacement cycle.\n- **Promotion: \"Hot Seat $50K\" running through May.** Hourly $500 drawings at random seats from 4pm-10pm. Targeting evening drive-in players.\n- **Loyalty:** Their tier program is roughly equivalent to ours; no apparent recent restructure.\n- **Marketing channels:** Heavy radio (Eastern OR markets), moderate Meta, light YouTube.\n- **Estimated impact on us:** Small. We're not their primary target. But if they continue buying machines at this pace, the gap widens.\n\n### Three Rivers\n- **NEW: launched \"Coastal Rewards\" loyalty program in March 2026.** Five tiers, similar structure to ours — including the same problem we identified in [[loyalty-tier-restructure]] (Bronze tier feels meaningless). Worth watching to see if they iterate.\n- **Promotion: weekly Tuesday $5K cash drawings.** Same structural issue Mother's Day [[mothers-day-2026-recap]] surfaced — drawings on a single day don't compound theo.\n- **Marketing channels:** Mostly Meta + email; very little radio or out-of-home.\n- **Estimated impact on us:** Negligible at this distance. Real competition for them is McKenzie River and the Eugene coast.\n\n## What we should pay attention to\n1. **Wildhorse new-machine velocity.** Their floor is getting fresher than ours, and the Q1 review [[q1-fy2026-slot-floor-review]] already flagged our 1¢ legacy reels as overdue. We should accelerate that refresh.\n2. **Wildhorse Saturday traffic from our DMA.** Mystery-shop license-plate scan in their lot showed 14% out-of-state-but-Oregon-side plates on a Saturday. Some of that is ours. Not enough to panic, but worth a follow-up scan in 90 days.\n3. **Three Rivers loyalty trajectory.** If they iterate quickly and we don't, they could leapfrog us on program design. Our [[loyalty-tier-restructure]] going live 2026-09-01 puts us ahead of them.\n\n## What we should NOT worry about\n- Three Rivers' Tuesday drawings — proven not to compound theo (we have data on this from Mother's Day).\n- Wildhorse \"Hot Seat\" — fun, novel, but they're trading visitation lift for direct cash giveaway. Not a structural threat to us.\n\n## Open intel work\n- Q3 mystery shop scheduled 2026-08-12 (Wildhorse) and 2026-08-19 (Three Rivers).\n- Player exit survey results from Q1 — only 4% mentioned competitor properties as a reason for skipping a visit. Re-running in Q3.\n- I'd like to subscribe to regional Eilers reports more formally — currently bumming reports off K. Standing-Rock at the gaming association. Cost: ~$8K/year. Will raise with GM at next 1:1.", "summary": "Q2 competitive scan: nearest two competitors are Three Rivers (60mi) and Wildhorse (40mi). Wildhorse is running aggressive new-machine promotion; Three Rivers launched a new loyalty program. Neither is taking material share from us, but Wildhorse trajectory bears watching.", "content_type": "intelligence", "logical_path": "intelligence/competitive/local-market-scan-2026-q2", "sensitivity": "strategic", "department": null, "owner_id": "usr_xr_admin", "tags": ["marketing", "competitive-intel", "intelligence", "strategic", "eric-kim", "indian-head-casino"], "domain_meta": {}, "version": 1, "status": "published", "source": "web_ui", "created_by": "usr_xr_admin", "updated_by": "usr_xr_admin", "created_at": "2026-05-23T21:00:54.543443Z", "updated_at": "2026-05-23T21:00:54.543443Z", "claim_type": null, "source_confidence": null, "verification_status": null, "conflict_with": []}, {"id": "f51c2f52-f18c-4bab-87ea-84be92913c05", "org_id": "org_demo", "title": "Brand &amp; Property Signage Refresh - Proposal", "content": "# Brand & Property Signage Refresh — Proposal\n\n**Status:** Approved by GM 2026-04-29, in execution\n**Author:** Eric Kim, Marketing Director\n**Vendor:** Sign Solutions (Portland)\n**Install:** 2026-06-15 / 2026-06-16 (Mon/Tue overnights)\n\n## What this is (and isn't)\nThis is a **signage refresh and brand palette modernization**. It is **not** a rebrand. The Indian Head Casino logo, name, and tribal identity remain unchanged. What we are changing:\n- Color palette is modernized — deeper jewel tones replace the late-2010s pastels.\n- Typography updated for legibility (the old display face was hard to read at distance).\n- New wayfinding system across the property (we get visitor complaints about not finding the cage or hi-limit room).\n- All physical signage produced in the new palette.\n\n## Why now\n- Existing signage is 8+ years old and shows visible wear/UV fade.\n- Wayfinding gap is a recurring complaint in player feedback.\n- Tribal council is preparing a property expansion master plan; refreshed brand assets give us a current baseline to build from.\n\n## Scope\n| Element | Status | Vendor cost |\n|---|---|---:|\n| Main entrance signage refresh | Proof approved 2026-05-22 | $14,200 |\n| Player Services kiosk wraps (×6) | Proof approved 2026-05-21 | $8,400 |\n| Hi-limit room entrance | Reproof'd 2026-05-22 (palette fix) | $4,800 |\n| Wayfinding signs (32 throughout property) | In production | $11,600 |\n| Restroom + back-of-house | Excluded from this round | — |\n| Brand guidelines doc (PDF for internal use) | Drafted by Northwest Creative, in review | $3,200 |\n| **Total** | | **$42,200** |\n\nWithin $50K budget envelope.\n\n## What's NOT in scope\n- Logo redesign — out of scope; tribal council would need to weigh in\n- Vehicle wraps (shuttle bus) — defer to FY2027\n- Promotional collateral (mailers, table tents) — already use updated palette internally\n- Digital channel creative — already current\n\n## Schedule\n- 2026-05-29: All proofs final\n- 2026-06-08: Production complete\n- 2026-06-15 (Mon overnight): Main entrance + hi-limit\n- 2026-06-16 (Tue overnight): Kiosks + wayfinding\n- 2026-06-17: Walkthrough + punchlist\n\n## Operational impact\nNegligible. All install is overnight in low-traffic windows. No floor disruption. No comms required to guests.\n\n## Open items\n- Brand guidelines doc — agency draft due 2026-05-30; I'll review before sharing with department heads.\n- Need to coordinate with [[summer-concert-series-2026]] — first show is 2026-06-28, two weeks after install. Signage all live by then.\n- Hi-limit room palette had to be re-proof'd because the agency originally used the OLD palette by accident. Caught in [[2026-05-21-eric-kim-daily]].", "summary": "Project to refresh property signage and update brand guidelines. Scope: kiosk wraps, entrance signage, hi-limit room, wayfinding. Brand palette modernized; no logo change. Install scheduled June 15-16.", "content_type": "project", "logical_path": "projects/marketing/brand-refresh-2026", "sensitivity": "project", "department": null, "owner_id": "usr_xr_admin", "tags": ["marketing", "brand", "signage", "project", "eric-kim", "indian-head-casino"], "domain_meta": {}, "version": 1, "status": "published", "source": "web_ui", "created_by": "usr_xr_admin", "updated_by": "usr_xr_admin", "created_at": "2026-05-23T21:00:25.477865Z", "updated_at": "2026-05-23T21:00:25.477865Z", "claim_type": null, "source_confidence": null, "verification_status": null, "conflict_with": []}, {"id": "7fe3b1b0-6233-4747-a91f-7ef4415ca2e1", "org_id": "org_demo", "title": "Meeting Notes - Summer Concert Series 2026 Planning Kickoff", "content": "# Meeting Notes — Summer Concert Series 2026 Planning Kickoff\n\n**Date:** 2026-05-22\n**Time:** 15:00–16:30\n**Location:** Marketing conference room\n**Author:** Eric Kim, Marketing Director\n**Attendees:**\n- Eric Kim (me) — Marketing\n- M. Chase — Marketing Manager\n- J. Tallchief — Events Coordinator\n- (Interim F&B lead — see note re: [[fb-director-replacement]] — sous chef R. Aliyah attended in F&B's place, with director on PTO)\n- D. Whitehorse — Tribal Facilities (audio/stage)\n\n## Confirmed shows\n| Date | Act | Genre | Capacity target | Ticket price |\n|---|---|---|---:|---:|\n| 2026-06-28 (Sat) | The 80s Outlaws (classic rock covers) | Classic rock | 1,800 | $25 (free for Gold+) |\n| 2026-07-19 (Sun) | Echoes of Eagles (Eagles tribute) | Tribute / older demo | 2,200 | $30 (free for Gold+) |\n| 2026-08-16 (Sat) | Garrett Reed Band | Country | 1,800 | $35 (free for Gold+) |\n\nAll in outdoor amphitheater. House at 2,400 capacity for ticketed seating, additional 600 standing.\n\n## Decisions\n- **Ticketing platform:** Stay with Eventbrite for transactional, layer loyalty redemption through our SDS interface (player gets a code at the cage, redeems on Eventbrite).\n- **Free for Gold+:** Continues prior-year policy. Estimated comp value: $42K across the three shows. Built into marketing budget.\n- **Pre-roll ad campaign:** Starts 4 weeks before each show, weighted toward Meta + YouTube (see Q1 digital [[q1-fy2026-digital-performance]]).\n- **F&B menu:** Refresh proposal [[snack-bar-refresh-proposal]] timing means we'd have the new equipment in place for July show. Push for outdoor concession trailer to handle June.\n\n## Open items\n- Two opening acts (June, August) still TBD. J. Tallchief on it; vendor calls Monday 2026-05-26.\n- Weather contingency: outdoor venue has no rain plan beyond \"move into bingo hall,\" which caps us at 800 seated. Need a real backup. D. Whitehorse to spec a temporary cover by 2026-06-08.\n- Security staffing — need to confirm with security director that we can cover all three nights without OT spike.\n- Sound check schedule conflicts with normal Saturday slot floor close-down for Garrett Reed show — coordinate with D. Yazzie.\n\n## Marketing milestones\n| Date | Action |\n|---|---|\n| 2026-05-26 | Vendor calls (opening acts) |\n| 2026-05-29 | Pre-roll creative briefed to agency |\n| 2026-06-01 | Tickets on sale (June show) — Diamond pre-sale 2026-05-30 |\n| 2026-06-12 | Father's Day creative live (separate, but overlapping timeline) |\n| 2026-06-22 | Diamond pre-sale (July show) |\n| 2026-07-12 | Diamond pre-sale (August show) |\n\n## Notes\n- F&B leadership transition matters here. R. Aliyah was sharp in the meeting; if she's promoted to interim per [[fb-director-replacement]] she's the one I'll be coordinating with through August.", "summary": "Summer concert series kickoff: three confirmed shows in outdoor venue (June 28, July 19, August 16). Discussed F&B prep, ticketing, marketing pre-roll, weather contingency. Two openers still TBD.", "content_type": "meeting", "logical_path": "meetings/marketing/summer-concert-series-2026", "sensitivity": "operational", "department": null, "owner_id": "usr_xr_admin", "tags": ["marketing", "events", "concerts", "summer-2026", "meeting", "eric-kim", "indian-head-casino"], "domain_meta": {}, "version": 1, "status": "published", "source": "web_ui", "created_by": "usr_xr_admin", "updated_by": "usr_xr_admin", "created_at": "2026-05-23T21:00:05.265411Z", "updated_at": "2026-05-23T21:00:05.265411Z", "claim_type": null, "source_confidence": null, "verification_status": null, "conflict_with": []}, {"id": "52b82e22-8694-4b70-bfbd-ff0cc4158992", "org_id": "org_demo", "title": "Q1 FY2026 Digital Channel Performance", "content": "# Q1 FY2026 Digital Channel Performance\n\n**Period:** 2026-01-01 → 2026-03-31\n**Author:** Eric Kim, Marketing Director\n**Audience:** GM (Tuesday brief)\n\n## Headline\nEmail is still our best channel by every measure. Paid social (Meta) is getting more expensive — CPM +22% YoY — and we should rotate budget toward YouTube, which outperformed in Q1 at lower spend. SEM is stable and we should not touch it.\n\n## Spend mix\n| Channel | Q1 spend | % of digital | YoY |\n|---|---:|---:|---:|\n| Meta (FB + IG) | $68K | 42% | +15% |\n| YouTube | $24K | 15% | +60% (was a small bet) |\n| SEM (Google) | $38K | 24% | +5% |\n| Email (vendor + design) | $18K | 11% | flat |\n| Programmatic display | $13K | 8% | -20% (cut deliberately) |\n| **Total digital** | **$161K** | | +12% |\n\n## Channel breakdown\n\n### Email\n- 78,400 unique recipients, 31% open rate (industry benchmark 22%), 6.2% CTR\n- Attributed visits: ~8,400 over Q1; attributed coin-in: $3.4M\n- **CPM-equivalent: $0.23** — orders of magnitude cheaper than any paid channel\n- This is the asset. Loyalty database quality and the upcoming [[db-segmentation-refresh]] both compound here.\n\n### Meta (FB + IG)\n- $68K spend, 14.2M impressions, $4.78 CPM (+22% YoY)\n- 19,200 clicks, 2.1% CTR (down from 2.4% LY — fatigue)\n- Attributed visits: ~3,100; attributed coin-in: $1.1M\n- **Cost per attributed visit: $22.** Acceptable but watch the trend.\n- CPM trend is the real story — Meta auction is getting more competitive in our DMA.\n\n### YouTube\n- $24K spend (much smaller bet for the first time at scale), 6.8M impressions, $3.53 CPM\n- 4,400 clicks, 0.65% CTR (low as expected; YT is upper-funnel)\n- Attributed visits: ~1,800; attributed coin-in: $720K\n- **Cost per attributed visit: $13** — better than Meta.\n- Strong direction signal: scale YT in Q2-Q3.\n\n### SEM\n- $38K spend, branded + competitor + category terms\n- Attributed visits: ~2,400 (mostly branded — i.e., the channel mostly captures intent, doesn't create it)\n- **Don't touch.** Branded SEM is defensive — it keeps competitors from showing up over our name.\n\n### Display (programmatic)\n- $13K spend; attribution is messy, possibly noise\n- Cut deliberately mid-quarter; would not restart without an attribution tool\n\n## Recommendations for Q2\n1. **Shift $15K from Meta to YouTube.** Net-neutral on spend; expected lift on attributed visits.\n2. **Hold Email spend flat.** It's our best dollar. Compounds when [[db-segmentation-refresh]] lands.\n3. **Hold SEM flat.**\n4. **Stay out of programmatic display** until we have attribution tooling.\n5. **Attribution tooling:** I want to put $20K against a multi-touch attribution platform in Q3 — Triple-Pixel or Northbeam. Will be a separate proposal.\n\n## Caveats\n- Attribution is last-click on our SDS join (loyalty card-in within 14 days of digital click). Real-world influence is broader — but I'm comfortable with last-click as a relative ranking tool, not an absolute one.\n- Mustang giveaway (April-May, see [[mustang-giveaway-2026-recap]]) lifted Q2 digital response across channels — Q2 numbers will look better than they should on an underlying basis. I'll note this in the Q2 wrap.", "summary": "Q1 digital performance: email still our most efficient channel, Meta CPM up 22% YoY (concerning), YouTube outperformed at lower volume, SEM stable. Recommending a Meta-to-YouTube shift in Q2 and pulling forward attribution tooling.", "content_type": "intelligence", "logical_path": "marketing/performance/q1-fy2026-digital", "sensitivity": "operational", "department": null, "owner_id": "usr_xr_admin", "tags": ["marketing", "digital", "performance", "q1-fy2026", "intelligence", "eric-kim", "indian-head-casino"], "domain_meta": {}, "version": 1, "status": "published", "source": "web_ui", "created_by": "usr_xr_admin", "updated_by": "usr_xr_admin", "created_at": "2026-05-23T20:59:39.561731Z", "updated_at": "2026-05-23T20:59:39.561731Z", "claim_type": null, "source_confidence": null, "verification_status": null, "conflict_with": []}, {"id": "e1b2e9fd-956c-4d13-831b-492a69ef19fd", "org_id": "org_demo", "title": "Player Database Segmentation Refresh - Proposal", "content": "# Player Database Segmentation Refresh — Proposal\n\n**Status:** Draft v1 — vendor evaluation in progress\n**Author:** Eric Kim, Marketing Director\n**Target launch:** 2026-10-01 (FY2027 start)\n\n## Problem\nOur current segmentation is a homegrown RFM (recency / frequency / monetary) Excel model that the analyst (Eli) refreshes monthly. It works, but:\n- **No predictive power.** It tells us who has been active; it can't tell us who is about to churn or who is most likely to respond to a specific offer.\n- **No cohort-level offer optimization.** We send the same Diamond mailer to all Diamonds. Reality is that a \"high theo, low frequency\" Diamond responds to a different offer than a \"moderate theo, very frequent\" Diamond.\n- **38% of Diamond mailers in Q1 went to inactives** — same number the [[loyalty-tier-restructure]] proposal cites. Not a coincidence; segmentation is the upstream problem.\n- **Marketing analyst (Eli) is a bottleneck.** Anything beyond the monthly refresh requires a special request.\n\n## Proposal\nAdopt a vendor predictive platform that ingests our SDS (Slot Data System) feed, loyalty data, and comp data, and outputs:\n- Churn probability per account\n- Best-next-offer per account (from a menu we define)\n- Predicted theo / next 90 days\n\nSurface this in our mailer and digital campaign tooling so we target on the predictions, not historical RFM.\n\n## Vendor evaluation\n| Vendor | Implementation | Annual | Demo verdict |\n|---|---:|---:|---|\n| PlayerOptix | ~$60-80K | ~$30K | **Strong.** Predictive churn model holds up on our redacted sample. References at two Pac NW properties. Verbal quote 2026-05-22. |\n| BeyondCRM | ~$120K | ~$55K | Functional but over-engineered for our 47K-active-player base. Pitched in March. |\n| Build internally on Snowflake + dbt | ~$40K dev + Eli's time | ~$5K cloud | Cheaper on paper but Eli is 1 FTE and already at capacity. Would slip the launch by 6+ months. |\n\n**My recommendation:** PlayerOptix. Implementation cost is the biggest line, but the annual ongoing is below what we'd pay in internal headcount to maintain a homegrown solution.\n\n## Expected impact (modeled)\n- Mailer reinvestment efficiency: +18% (less to inactives, more to predicted respond-likely)\n- Mailer response rate: +35-40% (industry case studies; we'd validate in pilot)\n- Churn prevention: hold ~150 mid-tier accounts that would otherwise lapse (~$60K theo/quarter retained)\n\n## Sequencing\n- 2026-06: Final vendor selection + tribal council approval (capex >$50K)\n- 2026-07-08: Kickoff with PlayerOptix\n- 2026-07 → 2026-09: Implementation, data feeds, training\n- 2026-10-01: Live for FY2027 marketing year\n- Coincides with [[loyalty-tier-restructure]] launch — important because segmentation IS the upstream input to the new tier benefits\n\n## Open questions\n- Tribal IT — need to confirm SDS export volume is feasible for a daily feed. Asking D. Whitehorse next week.\n- Do we model on theo or coin-in for the churn target? PlayerOptix recommends theo. I agree.\n- What's the BATNA if tribal council says no? Pause the project, stay on homegrown, revisit FY2028. I'd argue against this — too much downstream depends on better segmentation.", "summary": "Project to replace homegrown RFM-style segmentation with a vendor predictive platform (PlayerOptix leading). Target: better targeting on mailer/digital reinvestment, reduced waste on inactives, churn prediction.", "content_type": "project", "logical_path": "projects/marketing/db-segmentation-refresh", "sensitivity": "project", "department": null, "owner_id": "usr_xr_admin", "tags": ["marketing", "project", "segmentation", "playeroptix", "eric-kim", "indian-head-casino"], "domain_meta": {}, "version": 1, "status": "published", "source": "web_ui", "created_by": "usr_xr_admin", "updated_by": "usr_xr_admin", "created_at": "2026-05-23T20:59:14.420056Z", "updated_at": "2026-05-23T20:59:14.420056Z", "claim_type": null, "source_confidence": null, "verification_status": null, "conflict_with": []}, {"id": "6c153f23-7963-47eb-bed6-6c7438fa0874", "org_id": "org_demo", "title": "Mustang Giveaway 2026 - Post-Event Analysis", "content": "# Mustang Giveaway 2026 — Post-Event Analysis\n\n**Event:** 2026 Ford Mustang GT Giveaway\n**Earn period:** 2026-04-06 → 2026-05-17 (6 weeks)\n**Grand drawing:** Saturday 2026-05-17, 22:00\n**Author:** Eric Kim, Marketing Director\n**Draft date:** 2026-05-21 (final invoice reconciled)\n**Reviewed with GM:** scheduled 2026-05-27\n\n## Mechanic recap\n- Entries earned 1-for-1 with every 50 tier points during the earn period.\n- Saturdays were 3X entry multiplier days (six Saturdays in earn period).\n- Grand drawing at 22:00 on 5/17 required physical presence.\n- One grand prize: 2026 Ford Mustang GT, MSRP $48,200, dealer-net cost $46,000.\n\n## Costs (final)\n| Line | Budget | Actual |\n|---|---:|---:|\n| Vehicle (net of dealer co-op) | $46,000 | $44,600 (mat credit) |\n| Title/registration/sales tax | $4,500 | $4,520 |\n| Agency creative + production | $14,000 | $13,800 |\n| Paid media (Meta, YouTube, radio, billboard) | $22,000 | $22,400 |\n| Mailer drops (3 over 6 weeks) | $5,500 | $5,420 |\n| In-venue signage + kiosk graphics | $3,000 | $2,890 |\n| Grand-night labor + F&B comp | $0 (in ops) | $570 (security OT) |\n| **Total** | **$95,000** | **$94,200** |\n\n## Results\nComparing earn-period (6 weeks) vs. same-6-weeks LY:\n\n| KPI | Same period LY | This year | Variance |\n|---|---:|---:|---:|\n| Total visits | 168,400 | 197,300 | +17.2% |\n| Unique players | 41,200 | 47,800 | +16.0% |\n| New signups | 1,180 | 1,810 | +53.4% |\n| Coin-in | $68.4M | $78.0M | +14.0% |\n| Theo win | $6.61M | $7.55M | +14.2% |\n| Saturday-only coin-in | $14.1M | $17.8M | +26.2% |\n| Grand-drawing-night visits | n/a (not held LY) | 6,840 | n/a |\n\n## ROI calc\n- Incremental theo (above LY trend baseline of +3% organic): +$830K\n- All-in promo cost: $94.2K\n- **ROI: 8.8x on incremental theo, 1.62 vs. promo cost when only the earn-period margin uplift is counted.** Either way, a clear winner.\n\n## Why this worked (and Mother's Day didn't)\nThe Mustang earn-period mechanic compounds behavior over 6 weeks. Players adjust visit cadence — coming an extra night a week, sitting longer, playing higher denoms — to bank entries. That's coin-in, by definition.\n\nThe Mother's Day drawing was a one-day event. The mechanic was the same shape (more entries = more chances) but the time window was too short to change behavior; players just showed up and waited.\n\nImplication: **drawings work as earn-period anchors, not as single-day events.** Direction for H2 promo planning.\n\n## What worked tactically\n- Saturday 3X multipliers were a clear demand-shaper. Saturdays ran 26% above LY vs. 14% for the period as a whole. Pull this lever again.\n- Pendleton Ford partnership — exceptional. They co-marketed on their socials and added the mat credit late. Recommend re-engaging for a SUV giveaway in November (winter).\n- Physical-presence requirement on grand drawing night = 6,840 visits and the biggest Saturday of the year. Keep this for any future grand-prize event.\n\n## What didn't work\n- Mailer drop #2 (mid-period) underperformed on attribution. We saw a noise-level lift in the week following. Consider dropping mid-period mailers in favor of a single pre-event mailer + digital remarketing.\n- In-venue kiosk signage missed two banks for the first 10 days of the earn period (installer error). Probable lost lift estimated $15-20K coin-in.\n\n## Recommendations\n1. Lock a Q4 grand-prize anchor (SUV giveaway, November 2026) using the same 6-week earn-period structure.\n2. Drop mid-period mailers from the playbook; replace with digital remarketing only.\n3. Add an installer audit checklist to every in-venue signage rollout.\n4. Inform tribal council that the Mustang exceeded forecast — relevant to the FY2027 marketing budget ask.\n\n## Tie-ins\n- This is the \"drawing-as-earn-period\" pole of the Q2 hypothesis test. Mother's Day [[mothers-day-2026-recap]] is the \"drawing-as-single-day\" pole. Father's Day is the multiplier pole.\n- Q1 slot floor [[q1-fy2026-slot-floor-review]] shows hi-limit + Dragon Link as the standouts — the Mustang earn period likely pulled additional play into those banks. Worth a sub-analysis.", "summary": "Mustang giveaway recap: 6-week earn-period anchor promotion. Hit all KPIs — coin-in +14% vs. like-period, ROI 1.62, visitation crushed forecast. Drawing-mechanic concerns from Mother's Day do NOT apply here because the earn-period itself drives behavior over 6 weeks.", "content_type": "intelligence", "logical_path": "marketing/promotions/mustang-giveaway-2026-recap", "sensitivity": "operational", "department": null, "owner_id": "usr_xr_admin", "tags": ["marketing", "promotions", "mustang-giveaway", "recap", "intelligence", "eric-kim", "indian-head-casino"], "domain_meta": {}, "version": 1, "status": "published", "source": "web_ui", "created_by": "usr_xr_admin", "updated_by": "usr_xr_admin", "created_at": "2026-05-23T20:58:38.674585Z", "updated_at": "2026-05-23T20:58:38.674585Z", "claim_type": null, "source_confidence": null, "verification_status": null, "conflict_with": []}, {"id": "3a37b4b1-8782-41b5-a080-217d2e093685", "org_id": "org_demo", "title": "Meeting Notes - Q2 FY2026 Marketing Promotions Plan", "content": "# Meeting Notes — Q2 FY2026 Marketing Promotions Plan\n\n**Date:** 2026-03-18\n**Time:** 09:00–11:00\n**Location:** Marketing conference room\n**Author:** Eric Kim, Marketing Director\n**Attendees:**\n- Eric Kim (me) — Marketing\n- GM\n- K. Smith — Player Development\n- D. Yazzie — Slot Director\n- M. Chase — Marketing Manager (mine)\n- Agency lead (Northwest Creative, by phone)\n\n## Purpose\nLock the Q2 promotional calendar with budgets and mechanics, with an explicit framing: we are using the quarter to test \"drawing\" vs. \"multiplier\" mechanics back-to-back so we have an opinion on what to lean into for H2.\n\n## Q2 calendar locked\n| Promo | Window | Mechanic | All-in budget |\n|---|---|---|---:|\n| Mustang Giveaway | 2026-04-06 → 2026-05-17 (6 weeks earn period, grand drawing 5/17) | Earned entries (1 per 50 tier points) + Saturday 3X entry multipliers | $95K |\n| Mother's Day Cash Drawing | 2026-05-10 (Sunday) | $25K in cash drawings — 10 × $1K hourly + $15K grand | $30K |\n| Father's Day Points Multiplier | 2026-06-21 (Sunday) | 2X tier points all day | $22K |\n\n## Hypothesis we're testing\n- Drawings (Mustang, Mother's Day) win on visitation and signups, push on theo.\n- Multipliers (Father's Day) win on theo per dollar of cost, push on visitation.\n\nWe will know after Father's Day. Q3 will weight toward whichever wins.\n\n## Decisions\n- **Mustang** is anchor for the quarter. Pendleton Ford partnership confirmed at $46K net for a 2026 Mustang GT (after dealer co-op).\n- **Mother's Day** mechanic kept conservative on grand-prize size ($15K) — we are NOT trying to recreate Mustang's pull. It's a hold-the-line midweek-promotion play.\n- **Father's Day** budget intentionally lower — multiplier promotions are cheaper to run; we're sizing for proof, not scale.\n- **Father's Day creative direction:** family-friendly, no use of \"free play\" language (risk of misread). Agency to brief.\n- **No promotion** scheduled for the gap weeks (4/13, 4/20, 4/27, 5/4) — let Mustang earn-period carry organic traffic.\n\n## Open items at the time\n- M. Chase to confirm Mustang signage by 2026-03-25 ✓ done\n- Eric (me) to handle the 7-day mailer drop before each event ✓ ongoing\n- K. Smith to identify top 200 hosted accounts for Mustang earn-period personalization ✓ done\n\n## Risks discussed\n- Mustang earn period is long (6 weeks) — risk that incremental traffic plateaus mid-period. Mitigation = Saturday 3X multipliers.\n- Mother's Day on a Sunday is unusual for us; we typically run Tuesday promotions. Expecting visitation lift but theo TBD.\n- Father's Day budget is lean; if it underperforms we will get an unfair \"multipliers don't work\" read. Mitigation = control comparison vs. like-Sunday averages, not against Mustang's grand drawing day.\n\n## Follow-up cadence\nWeekly check-ins each Wednesday with M. Chase, K. Smith, and Agency through 2026-06-30.\n\n## Status note (as of 2026-05-23)\n- Mustang: complete. Recap [[mustang-giveaway-2026-recap]].\n- Mother's Day: complete. Recap [[mothers-day-2026-recap]]. Theo missed as hypothesized.\n- Father's Day: in execution. Creative round 3 finalized 2026-05-23.", "summary": "Q2 promotions calendar planning meeting. Locked Mustang giveaway as April-May anchor, Mother's Day cash drawing, Father's Day multiplier. Set hypothesis-testing framing across all three to compare drawing vs. multiplier mechanics.", "content_type": "meeting", "logical_path": "meetings/marketing/q2-promotions-plan", "sensitivity": "operational", "department": null, "owner_id": "usr_xr_admin", "tags": ["marketing", "promotions", "q2-fy2026", "meeting", "eric-kim", "indian-head-casino"], "domain_meta": {}, "version": 1, "status": "published", "source": "web_ui", "created_by": "usr_xr_admin", "updated_by": "usr_xr_admin", "created_at": "2026-05-23T20:58:05.672189Z", "updated_at": "2026-05-23T20:58:05.672189Z", "claim_type": null, "source_confidence": null, "verification_status": null, "conflict_with": []}, {"id": "6d205add-140d-4c07-bab3-2883ae402e84", "org_id": "org_demo", "title": "Marketing Daily - Eric Kim - 2026-05-23", "content": "# Marketing Daily — Eric Kim — Friday, 2026-05-23\n\n**Author:** Eric Kim, Marketing Director\n\n## Morning\n- Pulled Marketing's communications archive sample for the [[tgc-q2-audit-prep]] effort — handed to L. Carter at 09:30. Clean — every Diamond mailer we sent in Q1 has both the responsible-gaming language and self-exclusion contact. Good.\n- Approved final Father's Day creative round 3. Headline: \"Double the Reasons. Double the Points.\" Going to print Monday for table tents; digital assets live 2026-06-12.\n\n## Afternoon\n- **13:30 — Mother's Day recap with GM.** Productive. We agreed on the direction:\n  - Don't repeat cash drawings for the rest of FY2026.\n  - Father's Day pivots to 2X multiplier (already in motion).\n  - New-signup bonus mechanic stays but ties to first-visit-back instead of signup day.\n  - See [[mothers-day-2026-recap]].\n- Quick check with K. Smith on Diamond outreach — 4 of 6 inactive accounts now have appointments next week.\n\n## Weekend in motion\n- Mustang post-event mailer drop scheduled for Saturday delivery to all Tier-points-active accounts (Silver+). Subject: thank you and what's coming next.\n- Digital — Father's Day pre-roll campaign goes live Monday on Meta/YouTube; agency confirmed all assets uploaded.\n\n## Outstanding\n- Q1 digital channel performance write-up — Tuesday for GM.\n- PlayerOptix written quote — chasing by Wednesday.\n- Concert vendor calls Monday with two openers we still need to confirm — see [[summer-concert-series-2026]].\n\n## Notes to self\n- Loyalty proposal v3 needs another pass before GM sees it Tuesday. Eli (analyst) flagged that the courtesy-match calc was using 4-month avg theo, should be 6-month. Updating tonight. See [[loyalty-tier-restructure]].\n- Sign Solutions install confirmed for June 15/16.\n\n## Weekend\n- I'm not on-call. AGM has my number if anything blows up on player comms.", "summary": "Eric Kim's Friday log: Mother's Day recap held with GM (good direction set), Father's Day creative landed, weekend marketing in motion, prep for Monday concert vendor calls.", "content_type": "daily", "logical_path": "marketing/daily/2026-05/2026-05-23-eric-kim", "sensitivity": "operational", "department": null, "owner_id": "usr_xr_admin", "tags": ["daily-summary", "marketing", "eric-kim", "operations", "indian-head-casino"], "domain_meta": {}, "version": 1, "status": "published", "source": "web_ui", "created_by": "usr_xr_admin", "updated_by": "usr_xr_admin", "created_at": "2026-05-23T20:57:40.509940Z", "updated_at": "2026-05-23T20:57:40.509940Z", "claim_type": null, "source_confidence": null, "verification_status": null, "conflict_with": []}, {"id": "2892e8ae-b8bd-4374-8026-f5d07b0fd279", "org_id": "org_demo", "title": "Marketing Daily - Eric Kim - 2026-05-22", "content": "# Marketing Daily — Eric Kim — Thursday, 2026-05-22\n\n**Author:** Eric Kim, Marketing Director\n\n## Morning\n- **10:00 — PlayerOptix demo.** Strong product. Their predictive churn model uses 18 months of trailing data and produced sensible cohort plots for our redacted sample. Better than what BeyondCRM showed us in March. Pricing TBD but quoted \"$60-80K all-in implementation, $30K/yr after\" verbally. Building the case in [[db-segmentation-refresh]].\n- Sent agency the creative reject on Father's Day headline. New round expected by EOD Friday.\n\n## Midday\n- Pre-read pulled together for tomorrow's Mother's Day recap with GM. Headline I'm leading with: visits/signups crushed it, theo missed by 22%, the drawing mechanic is the culprit. Recommending we don't repeat the structure for Father's Day. See pre-draft in [[mothers-day-2026-recap]].\n\n## Afternoon\n- **15:00 — Summer concert series planning** with events team + F&B + facilities. Three confirmed shows so far: classic rock cover band (June 28), tribute act for the older demo (July 19), country act (August 16). All in the outdoor venue. Discussed F&B impact — see [[summer-concert-series-2026]].\n- Walked through fresh signage proofs with Sign Solutions PM. Hi-limit signage now in correct palette. Approved final on player services and main entrance wraps. Install scheduled 2026-06-15 / 16 (Mon/Tue overnights).\n\n## Outstanding\n- Father's Day creative round 3 — Friday\n- Q1 digital wrap — Tuesday next week\n- PlayerOptix written quote — requested by 2026-05-28\n\n## Tomorrow\n- Mother's Day recap with GM at 13:30\n- TGC audit prep — Marketing not in primary scope but L. Carter asked me to confirm we're clean on player communication archives. Pulling.", "summary": "Eric Kim's Thursday log: PlayerOptix segmentation demo (strong), summer concert series kickoff meeting held, prep for Friday Mother's Day recap with GM.", "content_type": "daily", "logical_path": "marketing/daily/2026-05/2026-05-22-eric-kim", "sensitivity": "operational", "department": null, "owner_id": "usr_xr_admin", "tags": ["daily-summary", "marketing", "eric-kim", "operations", "indian-head-casino"], "domain_meta": {}, "version": 1, "status": "published", "source": "web_ui", "created_by": "usr_xr_admin", "updated_by": "usr_xr_admin", "created_at": "2026-05-23T20:57:24.433654Z", "updated_at": "2026-05-23T20:57:24.433654Z", "claim_type": null, "source_confidence": null, "verification_status": null, "conflict_with": []}, {"id": "9d65abe3-8ba0-456f-87c2-8013f23fbd5d", "org_id": "org_demo", "title": "Marketing Daily - Eric Kim - 2026-05-21", "content": "# Marketing Daily — Eric Kim — Wednesday, 2026-05-21\n\n**Author:** Eric Kim, Marketing Director\n\n## Morning\n- Closed out final invoice reconciliation for the Mustang giveaway. Dealer (Pendleton Ford) credited us back $1,400 for the upgraded floor mats they couldn't source in time. Total final landed cost: $94,200 (vs. $95K budgeted). Updating the recap doc later this week — see [[mustang-giveaway-2026-recap]].\n- Reviewed Father's Day creative round 2 with agency. Pushed back on the headline — \"Dads Play Free\" reads like we're giving away free play to anyone with kids. Asked for round 3 by Friday. Direction we agreed in [[q2-promotions-plan]] is 2X tier points multiplier, NOT free play.\n\n## Afternoon\n- Property signage proofs landed from Sign Solutions. Player Services kiosk wraps look great. Hi-limit room entrance signage still uses old color palette — kicking back. Notes filed in [[brand-refresh-2026]].\n- Prep call with K. Smith (Player Development) on host pipeline. Six Diamond accounts have been inactive 90+ days and need outreach calls this week. Three are likely to drop tier under the new proposal [[loyalty-tier-restructure]] — telling K. Smith to mention the courtesy match if it comes up.\n- Pulled prelim digital channel performance for the Q1 wrap I owe the GM. Email open rate stable, Meta CPM up 22% YoY. Drafting in [[q1-fy2026-digital-performance]].\n\n## Outstanding\n- Recap doc on Mustang giveaway — push to Friday (after Mother's Day recap with GM)\n- Father's Day creative round 3 — Friday\n- Q1 digital wrap — Tuesday next week\n\n## Tomorrow\n- Vendor demo with PlayerOptix at 10:00 on segmentation tooling. Ties into [[db-segmentation-refresh]].\n- 1:1 with K. Smith on host pipeline at 13:00.", "summary": "Eric Kim's Wednesday log: Mustang giveaway revenue reconciliation, Father's Day creative review, signage proof iteration, comp host pipeline meeting prep.", "content_type": "daily", "logical_path": "marketing/daily/2026-05/2026-05-21-eric-kim", "sensitivity": "operational", "department": null, "owner_id": "usr_xr_admin", "tags": ["daily-summary", "marketing", "eric-kim", "operations", "indian-head-casino"], "domain_meta": {}, "version": 1, "status": "published", "source": "web_ui", "created_by": "usr_xr_admin", "updated_by": "usr_xr_admin", "created_at": "2026-05-23T20:57:08.285768Z", "updated_at": "2026-05-23T20:57:08.285768Z", "claim_type": null, "source_confidence": null, "verification_status": null, "conflict_with": []}, {"id": "8e2900fd-16e2-474e-bca2-a6299b929385", "org_id": "org_demo", "title": "Mother's Day Cash Drawing - Post-Event Recap", "content": "# Mother's Day Cash Drawing — Post-Event Recap\n\n**Event:** Mother's Day Cash Drawing\n**Date:** 2026-05-10 (Sunday)\n**Recap meeting:** 2026-05-23, 13:30\n**Attendees:** GM, Eric Kim (Marketing), D. Yazzie (Slots), K. Smith (Player Development)\n\n## Mechanic\n- $25,000 in cash drawings: 10 × $1,000 hourly drawings + one $15,000 grand drawing at 9pm.\n- Entry: every 100 tier points earned 2026-05-03 → 2026-05-10 = 1 entry.\n- \"Bring your mother\" bonus: 5 entries for a same-day signup of a guest 50+.\n\n## Results\n| KPI | Target | Actual | Variance |\n|---|---:|---:|---:|\n| Visits on event day | 5,200 | 5,460 | +5.0% |\n| New signups | 180 | 274 | +52% |\n| Incremental coin-in vs. like-Sunday avg | +$420K | +$310K | -26% |\n| Incremental theo vs. like-Sunday avg | +$40K | +$31K | -22% |\n| Total promo cost | $30K (incl. labor/F&B) | $32K | +6.7% |\n| ROI | 1.33 | 0.97 | miss |\n\n## Why we missed theo\n- **Drawing mechanic is non-incremental for our base.** Big winners drew crowds that came for the chance to win, sat for 20–40 min at low denoms to \"be on the floor for the drawing,\" then left. We saw visits and signups but not coin-in lift.\n- Bring-a-mother bonus over-indexed on signups but those new accounts have a 6-week activation gap on average — won't see lift until June at earliest.\n\n## What worked\n- Signups (+52% vs. target) is the bright spot. PD will track activation.\n- F&B uplift: snack bar revenue +38% Sunday — refresh proposal [[snack-bar-refresh-proposal]] will compound this on the next holiday.\n- No incidents, no comp complaints, no surveillance flags.\n\n## Direction\n- **Father's Day (2026-06-21):** SWITCH to **2X tier points multiplier all day**. Multiplier mechanics consistently drive coin-in lift, not just visits. Lower variance on ROI.\n- **Keep new-signup bonus** mechanic but tie to first-visit-back rather than signup-day.\n\n## Tie-ins\n- Loyalty refresh ([[loyalty-tier-restructure]]) will redesign the points value equation; sequencing of multiplier promo and tier launch matters — Eric Kim to align timing.", "summary": "Mother's Day cash drawing recap: hit visitation target but missed incremental theo target by 22%. Drawing mechanic drew non-incremental crowds. Direction set for Father's Day to switch to multiplier-points promotion.", "content_type": "intelligence", "logical_path": "marketing/promotions/mothers-day-2026-recap", "sensitivity": "operational", "department": null, "owner_id": "usr_xr_admin", "tags": ["marketing", "promotions", "mothers-day", "recap", "intelligence", "indian-head-casino"], "domain_meta": {}, "version": 2, "status": "published", "source": "web_ui", "created_by": "usr_xr_admin", "updated_by": "usr_xr_admin", "created_at": "2026-05-23T20:49:21.726194Z", "updated_at": "2026-05-23T20:56:21.124793Z", "claim_type": null, "source_confidence": null, "verification_status": null, "conflict_with": []}, {"id": "e53dea1e-f088-40e9-b553-306f71581a80", "org_id": "org_demo", "title": "Loyalty Program Tier Restructure Proposal", "content": "# Loyalty Program Tier Restructure Proposal\n\n**Status:** Draft v2 — under GM review\n**Author:** Marketing director (Eric Kim)\n**Sponsor:** GM\n**Target launch:** 2026-09-01 (start of FY2027 marketing year)\n\n## Problem statement\nCurrent 5-tier program (Bronze / Silver / Gold / Platinum / Diamond) was designed in 2019. Three issues today:\n1. **Mid-tier compression** — Silver-to-Gold jump is too small in value, so Silver players don't push for Gold. Visitation gap between the two tiers is only 0.4 visits/month.\n2. **Inactive Diamond carrying reinvestment cost** — 38% of Diamond members had zero visits in Q1 but continue to receive monthly mailers + free play. Estimated $87K/quarter wasted reinvestment.\n3. **Card-in penetration at 71%** vs. target 75%. Signal is that the program is no longer differentiated enough to make sign-up automatic.\n\n## Proposal\n- Collapse to **4 tiers:** Silver / Gold / Platinum / Diamond. Eliminate Bronze (becomes \"unranked / base\").\n- **Qualification thresholds** based on tier points earned in trailing 6 months:\n  - Silver: 250 pts\n  - Gold: 1,500 pts\n  - Platinum: 5,000 pts\n  - Diamond: 20,000 pts (was 15,000 — tighten the top)\n- **Diamond requalification:** add a 6-month inactivity rule. No visits in 180 days → drop to Platinum until next qualifying visit.\n- **Benefit redesign:** Gold gains free-play match doubled (largest mid-tier lift). Diamond benefits unchanged in dollar terms but inactivity gate applied.\n\n## Expected impact (Marketing model)\n- Card-in penetration: 71% → 76%\n- Reinvestment % of theo: 22.4% → 21.1% (-130 bps from inactive Diamond pruning)\n- Mid-tier visitation lift: +0.7 visits/month for Silver → Gold band\n- Net: +$340K theo/year, -$240K reinvestment/year, +$580K combined contribution\n\n## Risks\n- Inactive Diamond pruning will generate complaints. Mitigation: 90-day notice + one-time courtesy match.\n- IT lift to reconfigure ratings engine: ~4 weeks. Already scoped with vendor.\n\n## Tie-ins\n- Q1 review [[q1-fy2026-slot-floor-review]] confirms 71% card-in number and the upward trend.\n- Operational refresh of card sign-up flow at cage and slots is in scope.\n\n## Next steps\n- GM sign-off: target 2026-06-05\n- Tribal council briefing: 2026-06 monthly\n- IT vendor SOW: 2026-06-15\n- Soft launch communications: 2026-07-15\n- Hard launch: 2026-09-01", "summary": "Proposal to collapse loyalty tiers from 5 to 4 and rebalance qualification thresholds. Goal: lift mid-tier engagement and reduce reinvestment leakage to inactive top-tier accounts.", "content_type": "project", "logical_path": "projects/marketing/loyalty-tier-restructure", "sensitivity": "project", "department": null, "owner_id": "usr_xr_admin", "tags": ["marketing", "loyalty", "player-development", "project", "indian-head-casino"], "domain_meta": {}, "version": 2, "status": "published", "source": "web_ui", "created_by": "usr_xr_admin", "updated_by": "usr_xr_admin", "created_at": "2026-05-23T20:47:58.371091Z", "updated_at": "2026-05-23T20:56:20.665322Z", "claim_type": null, "source_confidence": null, "verification_status": null, "conflict_with": []}, {"id": "a8edbd29-6959-420b-8665-3f455f45ad27", "org_id": "org_demo", "title": "Decision - IGT Slot Maintenance Contract Renewal", "content": "# Decision — IGT Slot Maintenance Contract Renewal\n\n**Status:** Pending — final terms expected 2026-05-26\n**Owner:** GM (with slot director D. Yazzie + procurement)\n**Current contract expires:** 2026-06-30\n\n## Vendor and scope\n- **Vendor:** IGT (International Game Technology)\n- **Covers:** Onsite maintenance and parts for ~280 IGT-branded units (56% of floor), 4-hour SLA business hours, 8-hour off-hours, included firmware updates.\n- **Current annual cost:** $410K\n\n## What IGT proposed\n- New term: 3 years\n- Price increase: **+9% Year 1**, +3% YoY Years 2–3.\n- SLA: unchanged.\n- Adds: one quarterly proactive PM visit per bank.\n\n## Where we are\n- Counter-proposed: **+4% Year 1**, +2.5% YoY Years 2–3.\n- Tightened SLA: 3-hour response business hours, 6-hour off-hours, with $500 credit per breach.\n- Holding the quarterly proactive PM addition.\n\n## What's driving the counter\n- D. Yazzie's data: IGT SLA breaches were 4 in the prior year (mostly during high-coverage periods). 4-hour business response isn't enough on a Saturday.\n- We have leverage: Aristocrat has been actively pitching us, and slot mix has been shifting away from IGT over the past 18 months as Dragon Link (Aristocrat) outperforms (see [[q1-fy2026-slot-floor-review]]).\n\n## Risk if we walk\n- IGT-branded units' downtime would spike during the transition while we onboarded an independent technician network. Estimated 30-day risk.\n- Counterweight: we hold 56% of floor on IGT today, but that share is forecast to drop to ~48% by FY2027 Q2 with planned Aristocrat additions, weakening IGT's leverage over time.\n\n## Decision criteria for Monday\n- **Approve at terms ≤ +5% Year 1 AND SLA tightened** → 3-year renewal.\n- **+6–8% Year 1** → 1-year extension only, re-bid in FY2027.\n- **Above +8%** → reject, accelerate Aristocrat-led floor shift, bridge with independent tech network.\n\n## Tie-ins\n- Cost lands in FY2027 budget — coordinate with T. Begay (Finance) to slot the right number before [[fy2027-salary-planning]] consolidation.\n- ATS testing during [[backup-generator-kickoff]] cutovers will need IGT presence on standby — needs to be in renewed contract.", "summary": "Pending decision on IGT slot maintenance contract renewal. Vendor proposed 9% price increase; we are negotiating to 4% with SLA tightening on response time. Final terms expected Monday 2026-05-26.", "content_type": "decision", "logical_path": "decisions/vendors/igt-maintenance-2026", "sensitivity": "operational", "department": null, "owner_id": "usr_xr_admin", "tags": ["decision", "vendors", "igt", "slots", "contract-renewal", "indian-head-casino"], "domain_meta": {}, "version": 1, "status": "published", "source": "web_ui", "created_by": "usr_xr_admin", "updated_by": "usr_xr_admin", "created_at": "2026-05-23T20:49:58.609673Z", "updated_at": "2026-05-23T20:49:58.609673Z", "claim_type": null, "source_confidence": null, "verification_status": null, "conflict_with": []}, {"id": "14b4d0d9-38a3-4f08-a339-0abf0699f0ae", "org_id": "org_demo", "title": "Security Incident Log - 2026-05-22 Intoxicated Patron, Bank 14", "content": "# Security Incident Log — 2026-05-22\n\n**Incident #:** 2026-0522-014\n**Time:** 21:35–22:02\n**Location:** North slot bank, Bank 14 (Lightning Link)\n**Reporting officer:** S. Begay (Security, Shift 2)\n**GM aware:** Yes (real-time via radio at 21:38)\n\n## Summary\nMale patron, mid-50s, refused additional beverage service by cocktail server per our intoxication policy. Became verbally abusive — profanity, gestures, no physical threat. Slot attendant (T. James) called for security; two officers responded within 90 seconds.\n\n## Sequence\n- 21:35 — Cocktail server refuses third double bourbon, offers water, alerts attendant per protocol.\n- 21:36 — Patron escalates, shouts at attendant. Surrounding players move away (4 patrons observed leaving the bank).\n- 21:37 — Slot attendant calls security.\n- 21:38 — GM notified by radio.\n- 21:39 — Officers arrive. Patron compliant once approached, agrees to leave.\n- 21:50 — Patron exits property with officer escort. Vehicle keys not in possession (confirmed via wallet check at his request — Uber called by him from lobby).\n- 22:02 — Trespass warning issued, signed receipt acknowledged.\n\n## Outcome\n- **Trespass status:** One-year trespass, effective 2026-05-22 → 2027-05-22.\n- **Patron loyalty account:** Flagged in CRM; cocktail and table services restricted.\n- **No injuries.** No use of force.\n- **Surveillance:** Full coverage from entry to exit. Tape preserved 90 days per policy.\n\n## Follow-ups\n- T. James debriefed; offered EAP. Continuing shift.\n- S. Begay completed standard incident report by 23:30.\n- TGC notification: not required (no use of force, no patron injury). Logged in standard report.\n- Considered for [[tgc-q2-audit-prep]] sample? No — outside audit window, but pattern of cocktail refusal events worth a Q2 review.\n\n## Pattern note\nThird Thursday-night cocktail incident in 8 weeks. None individually escalates to a procedural issue. But three in eight weeks is enough to warrant a beverage-policy refresh meeting with F&B (post-leadership transition — see [[fb-director-replacement]]).", "summary": "Intoxicated patron refused beverage service, became verbally abusive to slot attendant. Security escorted out without force; one-year trespass warning issued. No injuries, no medical, surveillance has full coverage.", "content_type": "daily", "logical_path": "security/incidents/2026-05-22-intox-bank-14", "sensitivity": "operational", "department": null, "owner_id": "usr_xr_admin", "tags": ["security", "incident", "operations", "indian-head-casino"], "domain_meta": {}, "version": 1, "status": "published", "source": "web_ui", "created_by": "usr_xr_admin", "updated_by": "usr_xr_admin", "created_at": "2026-05-23T20:49:39.345225Z", "updated_at": "2026-05-23T20:49:39.345225Z", "claim_type": null, "source_confidence": null, "verification_status": null, "conflict_with": []}, {"id": "9c510c39-a1f3-40e5-a81f-191e525db7f5", "org_id": "org_demo", "title": "Snack Bar Menu &amp; Equipment Refresh Proposal", "content": "# Snack Bar Menu & Equipment Refresh Proposal\n\n**Status:** Draft v3 — GM carrying due to F&B director gaps (see [[fb-director-replacement]])\n**Target completion:** 2026-08-31\n**Budget envelope:** $185K (capex + opening menu inventory)\n\n## Why now\n- Three fryer incidents in six weeks; aging line is now operationally unsafe.\n- Menu unchanged since 2022. Average ticket $9.40 — stagnant for two years.\n- Player surveys (Q1 loyalty panel) cite snack bar as second-biggest complaint after parking.\n\n## Scope\n### Equipment\n- **Replace:** twin 40-lb fryers (one is the recurring failure unit), 36\" grill, microwave bank.\n- **Add:** rapid-cook oven (TurboChef or equivalent) to support hot grab-and-go.\n- **Keep:** existing fountain, slushie unit (under 3 years old), prep coolers.\n\n### Menu\n- Drop low-volume items (chili-cheese fries, breakfast burrito — top 2 waste contributors).\n- Add: bowls (rice/protein/veg), elevated grab-and-go salads, kid combo.\n- Reprice mid-tier items +$0.50–$1.00 (Sysco cost increases since 2022 have not been passed through).\n\n### Operations\n- New POS macros for combos (10 min saved per shift on labeling).\n- Updated PM schedule on all equipment, owned by sous chef R. Aliyah (will likely be promoted to interim manager — see [[fb-director-replacement]]).\n\n## Expected outcomes\n- Average ticket: $9.40 → $11.20 (+19%)\n- Downtime: <2 hours/month equipment-related vs. ~14 hours/month YTD\n- Snack bar contribution margin: +6 points\n\n## Schedule\n- Equipment ordered: 2026-06-10\n- Closure window for install: 2026-07-13 → 2026-07-17 (overnight closures + 2 daytime closures, Mon/Tue lowest-revenue days)\n- Soft launch new menu: 2026-07-18\n- Hard launch + marketing push: 2026-08-01\n\n## Risks\n- F&B leadership transition coinciding with refresh — sequencing handled via [[fb-director-replacement]] timing plan.\n- Tribal council requires capex >$150K approval; already on June agenda.\n\n## Open\n- Need final equipment quote from Sysco Equipment (expected 2026-05-30).\n- TGC notification not required (no gaming impact).", "summary": "Project to refresh snack bar menu and replace aging fryer/grill line. Targeted to lift average ticket, reduce equipment downtime, and align offering with current player preferences.", "content_type": "project", "logical_path": "projects/fb/snack-bar-refresh", "sensitivity": "project", "department": null, "owner_id": "usr_xr_admin", "tags": ["fb", "snack-bar", "project", "capex", "indian-head-casino"], "domain_meta": {}, "version": 1, "status": "published", "source": "web_ui", "created_by": "usr_xr_admin", "updated_by": "usr_xr_admin", "created_at": "2026-05-23T20:49:00.736807Z", "updated_at": "2026-05-23T20:49:00.736807Z", "claim_type": null, "source_confidence": null, "verification_status": null, "conflict_with": []}, {"id": "b41a6cad-917a-46ea-b0bf-f1aef37367fe", "org_id": "org_demo", "title": "Decision - 90-Day Trial of High Card Flush", "content": "# Decision — 90-Day Trial of High Card Flush\n\n**Decision date:** 2026-05-23\n**Decision maker:** GM\n**Effective:** Monday 20
